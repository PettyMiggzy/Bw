<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CHRONIC · Pool Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.2/ethers.umd.min.js"></script>
<style>
:root{--bg:#04130a;--panel:#0a1f12;--green:#5dff8b;--acid:#b6ff3c;--mon:#b79bff;--ink:#eafff0;--dim:#7fc79a;--fd:'Orbitron',sans-serif;--fm:'Outfit',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:var(--fm);min-height:100vh;
  background-image:radial-gradient(120% 60% at 50% -10%,rgba(93,255,139,.14),transparent 60%)}
.wrap{max-width:480px;margin:0 auto;padding:24px 18px 60px}
h1{font-family:var(--fd);color:var(--green);font-size:26px;letter-spacing:1px;text-align:center;text-shadow:0 0 20px rgba(93,255,139,.5)}
.sub{text-align:center;color:var(--dim);font-size:12px;margin:6px 0 20px}
#connectBtn{display:block;margin:0 auto 18px;font-family:var(--fd);font-size:12px;letter-spacing:1px;border:1px solid var(--green);background:transparent;color:var(--green);border-radius:30px;padding:10px 18px;cursor:pointer}
.balcard{background:linear-gradient(180deg,var(--panel),rgba(4,19,10,.9));border:1px solid rgba(93,255,139,.22);border-radius:18px;padding:24px;text-align:center;margin-bottom:18px}
.balcard .lab{color:var(--dim);font-size:11px;letter-spacing:.12em;text-transform:uppercase}
.balcard .big{font-family:var(--fd);font-size:34px;margin:4px 0 14px}
.chr{color:var(--green)}.mn{color:var(--mon)}
.row{display:flex;gap:10px;margin-top:14px}
.row input{flex:1;background:#06170e;border:1px solid rgba(93,255,139,.2);border-radius:10px;padding:12px;color:var(--ink);font-size:15px}
.row button{font-family:var(--fd);font-size:12px;border:0;border-radius:10px;padding:12px 16px;cursor:pointer;background:linear-gradient(90deg,#27d96b,var(--acid));color:#04130a}
.row button:disabled{opacity:.4}
.msg{text-align:center;color:var(--dim);font-size:13px;margin-top:14px;word-break:break-all;min-height:18px}
.contract{text-align:center;font-size:10px;color:var(--dim);margin-top:18px;word-break:break-all}
a{color:var(--green);text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <h1>POOL ADMIN</h1>
  <div class="sub">monitor & resupply the CHRONIC reward pool 🌿</div>
  <button id="connectBtn">CONNECT</button>

  <div class="balcard">
    <div class="lab">CHRONIC in pool</div>
    <div class="big chr" id="balChr">…</div>
    <div class="lab">MON in pool</div>
    <div class="big mn" id="balMon">…</div>
    <div class="row">
      <input id="chrAmt" type="number" placeholder="CHRONIC amount" />
      <button id="addChr" disabled>SEND</button>
    </div>
    <div class="row">
      <input id="monAmt" type="number" placeholder="MON amount" />
      <button id="addMon" disabled>SEND</button>
    </div>
    <div class="msg" id="msg"></div>
  </div>

  <div class="contract">pool: <span id="caddr"></span><br><a href="/claim">‹ claim page</a></div>
</div>

<script>
const CONTRACT="0xa226c2d7735F5D0d433059CAb572D8bc461e8890";
const CHRONIC="0x52641feEdCE831247514bf7C2378513741077777";
const RPC="https://monad-mainnet.g.alchemy.com/v2/_ZfKSl1YD2Yur6eajfKkN";
const POOL_ABI=["function poolBalances() view returns (uint256,uint256)","function fundMon() payable"];
const ERC20=["function transfer(address,uint256) returns (bool)","function decimals() view returns (uint8)"];
const $=i=>document.getElementById(i);
$('caddr').textContent=CONTRACT;
let signer=null;

async function loadBal(){
  try{
    const ro=new ethers.JsonRpcProvider(RPC,143);
    const c=new ethers.Contract(CONTRACT,POOL_ABI,ro);
    const [chr,mon]=await c.poolBalances();
    $('balChr').textContent=Number(ethers.formatUnits(chr,18)).toLocaleString(undefined,{maximumFractionDigits:0});
    $('balMon').textContent=Number(ethers.formatEther(mon)).toLocaleString(undefined,{maximumFractionDigits:3});
  }catch(e){ $('balChr').textContent='—'; $('balMon').textContent='—'; }
}
loadBal(); setInterval(loadBal,15000);

$('connectBtn').onclick=async()=>{
  if(!window.ethereum){alert('no wallet');return;}
  const bp=new ethers.BrowserProvider(window.ethereum);
  await bp.send('eth_requestAccounts',[]);
  signer=await bp.getSigner();
  $('connectBtn').textContent=(await signer.getAddress()).slice(0,6)+'…';
  $('addChr').disabled=false; $('addMon').disabled=false;
};

$('addChr').onclick=async()=>{
  const v=$('chrAmt').value; if(!v||Number(v)<=0)return;
  try{ $('msg').textContent='sending CHRONIC…';
    const t=new ethers.Contract(CHRONIC,ERC20,signer);
    const tx=await t.transfer(CONTRACT, ethers.parseUnits(String(v),18));
    await tx.wait(); $('msg').innerHTML='✅ sent '+v+' CHRONIC<br>'+tx.hash; $('chrAmt').value=''; loadBal();
  }catch(e){ $('msg').textContent='failed: '+((e&&e.shortMessage)||e.message); }
};
$('addMon').onclick=async()=>{
  const v=$('monAmt').value; if(!v||Number(v)<=0)return;
  try{ $('msg').textContent='sending MON…';
    const c=new ethers.Contract(CONTRACT,POOL_ABI,signer);
    const tx=await c.fundMon({value:ethers.parseEther(String(v))});
    await tx.wait(); $('msg').innerHTML='✅ sent '+v+' MON<br>'+tx.hash; $('monAmt').value=''; loadBal();
  }catch(e){ $('msg').textContent='failed: '+((e&&e.shortMessage)||e.message); }
};
</script>
</body>
</html>
