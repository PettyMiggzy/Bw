<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>🪙 Buy $CHRONIC</title>
<meta name="description" content="Buy $CHRONIC with SOL in one click — swap via Jupiter, no extension. then burn it." />
<link rel="canonical" href="https://www.burnchronic.xyz/buy" />
<meta property="og:title" content="🪙 Buy $CHRONIC" />
<meta property="og:description" content="Ape into $CHRONIC — swap SOL → $CHRONIC via Jupiter, one click. then burn it 🔥" />
<meta property="og:image" content="https://www.burnchronic.xyz/assets/og-chronic.jpg" />
<meta name="twitter:card" content="summary_large_image" />
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png?v=4" />
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Bungee+Shade&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
:root{--void:#070a07;--panel:#101a12;--green:#52ff8f;--green-dim:#2bd96a;--green-deep:#0c3d22;--ember:#ff6a2b;--ember2:#ff3d1f;--gold:#f5cf57;--purple:#a85cff;--text:#e9ffe9;--dim:#84a78d;--line:rgba(82,255,143,.16);--fd:'Bungee',sans-serif;--fh:'Bungee Shade',sans-serif;--fm:'Space Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--void);color:var(--text);font-family:var(--fm);min-height:100%;display:flex;flex-direction:column;
 background-image:radial-gradient(120% 60% at 50% -10%,rgba(82,255,143,.18),transparent 60%),radial-gradient(80% 50% at 100% 18%,rgba(245,207,87,.12),transparent 55%);}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;background-image:linear-gradient(rgba(82,255,143,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(82,255,143,.045) 1px,transparent 1px);background-size:42px 42px;mask-image:radial-gradient(120% 80% at 50% 0,#000,transparent 75%)}
.bar{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 14px;backdrop-filter:blur(12px);background:linear-gradient(180deg,rgba(7,10,7,.92),rgba(7,10,7,.4));border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:9px;font-family:var(--fd);color:var(--gold);font-size:15px;text-decoration:none}
.brand img{width:26px;height:26px;border-radius:7px}
.bar a.nav{color:var(--dim);font-size:12px;text-decoration:none}
.wrap{position:relative;z-index:2;flex:1;max-width:460px;width:100%;margin:0 auto;padding:24px 16px 60px;display:flex;flex-direction:column;justify-content:center}
h1{font-family:var(--fh);font-size:clamp(40px,15vw,68px);line-height:.9;text-align:center;color:var(--green);text-shadow:0 0 34px rgba(82,255,143,.5),4px 4px 0 var(--green-deep)}
.sub{text-align:center;color:var(--dim);font-size:12px;letter-spacing:.08em;text-transform:uppercase;margin:8px 0 22px}
.sub b{color:var(--gold)}
.card{background:linear-gradient(180deg,rgba(16,26,18,.9),rgba(10,15,11,.92));border:1px solid var(--line);border-radius:20px;padding:18px}
.lab{font-family:var(--fd);font-size:10px;letter-spacing:.18em;color:var(--green);text-transform:uppercase;margin-bottom:10px}
.amts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.amt{font-family:var(--fd);font-size:13px;padding:13px 6px;border-radius:13px;cursor:pointer;text-align:center;background:rgba(7,10,7,.5);border:1px solid var(--line);color:var(--text);transition:.15s}
.amt.on{background:linear-gradient(90deg,var(--green-dim),var(--green));color:#04140a;border-color:transparent}
.amt:active{transform:scale(.96)}
.custom{display:flex;align-items:center;gap:8px;background:rgba(7,10,7,.5);border:1px solid var(--line);border-radius:13px;padding:4px 12px;margin-bottom:16px}
.custom input{flex:1;background:transparent;border:0;color:var(--green);font-family:var(--fm);font-size:15px;padding:11px 0;outline:none}
.custom span{color:var(--dim);font-size:11px;font-weight:700}
.btn{width:100%;font-family:var(--fd);font-size:15px;border:0;border-radius:14px;padding:16px;cursor:pointer;letter-spacing:.04em}
.btn.go{background:linear-gradient(90deg,var(--green-dim),var(--green));color:#04140a;box-shadow:0 8px 28px rgba(82,255,143,.3)}
.btn.go:disabled{opacity:.5;box-shadow:none}
.btn.ghost{background:transparent;border:1px solid var(--green-dim);color:var(--green)}
.btn:active{transform:scale(.98)}
.meta{text-align:center;font-size:10px;color:var(--dim);margin-top:14px;letter-spacing:.06em}
.who{text-align:center;font-size:10px;color:var(--dim);margin-top:8px}.who b{color:var(--green)}
.note{text-align:center;font-size:11px;color:var(--dim);margin-top:20px;line-height:1.6}
.note a{color:var(--green);text-decoration:none}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);z-index:40;opacity:0;background:var(--green);color:#04140a;font-family:var(--fd);font-size:12px;padding:11px 18px;border-radius:30px;transition:.25s;pointer-events:none;text-align:center;max-width:92vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.bad{background:var(--ember2);color:#fff}
</style>
</head>
<body>
<div class="bar">
  <a class="brand" href="/"><img src="/assets/logo-chronic.png" alt="$CHRONIC"/>BUY</a>
  <a class="nav" href="/burn">🔥 burn it ›</a>
</div>
<div class="wrap">
  <h1>BUY</h1>
  <div class="sub">$CHRONIC · <b>swap SOL via Jupiter</b> · then burn it</div>
  <div class="card">
    <div class="lab">▸ How much SOL?</div>
    <div class="amts" id="amts"></div>
    <div class="custom"><input id="amt" type="number" inputmode="decimal" step="0.01" placeholder="custom SOL amount" /><span>SOL</span></div>
    <button class="btn go" id="buyBtn">🪙 Connect &amp; Buy</button>
    <button class="btn ghost" id="cardBtn" style="margin-top:10px">💳 No SOL? Buy with card</button>
    <a class="btn ghost" id="shareBtn" style="display:none;margin-top:10px" target="_blank" rel="noopener">🐦 Aped it — flex on X</a>
    <div class="meta">routed by Jupiter · ~5% max slippage · you sign in your wallet</div>
    <div class="who" id="who"></div>
  </div>
  <div class="note">no extension needed — just a Solana wallet with SOL.<br/>then go <a href="/burn">🔥 burn</a> · <a href="/grow">🌱 grow</a> · <a href="/">home</a><br/>📧 <a href="mailto:team@burnchronic.xyz">team@burnchronic.xyz</a></div>
</div>
<div class="toast" id="toast"></div>
<script>
var PRESETS=[0.1,0.5,1], amount=0.1, wallet=null;
var $=function(i){return document.getElementById(i);};
var _th;function toast(m,bad){var t=$('toast');t.textContent=m;t.classList.toggle('bad',!!bad);t.classList.add('show');clearTimeout(_th);_th=setTimeout(function(){t.classList.remove('show');},2400);}
function setAmt(a){amount=a;document.querySelectorAll('.amt').forEach(function(b){b.classList.toggle('on',+b.dataset.a===a);});if(wallet)$('buyBtn').textContent='🪙 Buy '+a+' SOL of $CHRONIC';}
function buildAmts(){var w=$('amts');w.innerHTML='';PRESETS.forEach(function(a){var d=document.createElement('div');d.className='amt'+(a===amount?' on':'');d.dataset.a=a;d.textContent=a+' SOL';d.onclick=function(){$('amt').value='';setAmt(a);};w.appendChild(d);});}
$('amt').addEventListener('input',function(){var v=Number(this.value);if(v>0){document.querySelectorAll('.amt').forEach(function(b){b.classList.remove('on');});amount=v;if(wallet)$('buyBtn').textContent='🪙 Buy '+v+' SOL of $CHRONIC';}});

function provider(){var p=(window.phantom&&window.phantom.solana)||window.solana;return(p&&p.isPhantom)?p:null;}
function isMobile(){var u=navigator.userAgent||'';return /android|iphone|ipad|ipod/i.test(u)||(/Macintosh/.test(u)&&navigator.maxTouchPoints>1);}
var _w3;async function web3(){if(!_w3)_w3=await import('https://esm.sh/@solana/web3.js@1.95.3');return _w3;}
function conn(w3){return new w3.Connection(location.origin+'/api/solrpc','confirmed');}

async function connect(){
  var p=provider();
  if(!p){ if(isMobile()){ toast('opening in Phantom…'); var t=encodeURIComponent(location.href.replace('://burnchronic.xyz/','://www.burnchronic.xyz/')); location.href='https://phantom.app/ul/browse/'+t+'?ref='+encodeURIComponent('https://www.burnchronic.xyz'); return false; } toast('Phantom not found — install it',true); return false; }
  var resp=await p.connect(); wallet=resp.publicKey.toString();
  $('who').innerHTML='aping as <b>'+wallet.slice(0,4)+'…'+wallet.slice(-4)+'</b>';
  $('buyBtn').textContent='🪙 Buy '+amount+' SOL of $CHRONIC';
  return true;
}

async function doBuy(){
  var btn=$('buyBtn');
  if(!wallet){ if(!(await connect())) return; }
  if(!(amount>0)){ toast('enter a SOL amount',true); return; }
  btn.disabled=true; var label=btn.textContent; btn.textContent='getting best route…';
  try{
    var r=await fetch('/api/actions/buy?sol='+amount,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({account:wallet})});
    var j=await r.json();
    if(j.error||!j.transaction){ toast(j.message||j.error||'no route',true); btn.disabled=false; btn.textContent=label; return; }
    btn.textContent='approve in wallet 🪙';
    var w3=await web3();
    var raw=Uint8Array.from(atob(j.transaction),function(c){return c.charCodeAt(0);});
    var tx=w3.VersionedTransaction.deserialize(raw);
    var p=provider(); var sig;
    if(p.signAndSendTransaction){ var s=await p.signAndSendTransaction(tx); sig=s.signature||s; }
    else { var signed=await p.signTransaction(tx); sig=await conn(w3).sendRawTransaction(signed.serialize()); }
    btn.textContent='swapping… ⛓';
    for(var i=0;i<30;i++){ try{ var st=await conn(w3).getSignatureStatuses([sig]); var v=st&&st.value&&st.value[0]; if(v&&(v.confirmationStatus==='confirmed'||v.confirmationStatus==='finalized')){ if(v.err) throw new Error('swap failed'); break; } }catch(e){ if(/swap failed/.test(e.message)) throw e; } await new Promise(function(r){setTimeout(r,1500);}); }
    toast('🪙 bought $CHRONIC with '+amount+' SOL — now go burn it 🔥');
    var txt='just aped $CHRONIC with '+amount+' SOL 🪙💀 burn it don’t hoard it 👇';
    $('shareBtn').href='https://twitter.com/intent/tweet?text='+encodeURIComponent(txt)+'&url='+encodeURIComponent('https://www.burnchronic.xyz/buy');
    $('shareBtn').style.display='block';
    btn.disabled=false; btn.textContent='🪙 Buy more';
  }catch(e){ toast(/reject/i.test((e&&e.message)||'')?'cancelled':'buy failed: '+((e&&e.message)||e),true); btn.disabled=false; btn.textContent=label; }
}
$('buyBtn').addEventListener('click',doBuy);

// ── Fiat on-ramp: card → SOL into the user's wallet (MoonPay does KYC + card),
// then they swap SOL → $CHRONIC right here. No SOL required to start.
async function doCard(){
  var btn=$('cardBtn');
  if(!wallet){ if(!(await connect())) return; }
  btn.disabled=true; var label=btn.textContent; btn.textContent='opening card checkout…';
  try{
    var r=await fetch('/api/moonpay?intent=buy&address='+encodeURIComponent(wallet)+(amount>0?'&usd='+Math.round(amount*180):''));
    var j=await r.json();
    if(j.error==='ramp_unconfigured'){ toast('💳 card buy unlocks soon — use SOL for now',true); btn.disabled=false; btn.textContent=label; return; }
    if(j.error||!j.url){ toast(j.error||'card checkout unavailable',true); btn.disabled=false; btn.textContent=label; return; }
    window.open(j.url,'_blank','noopener');
    toast('💳 finish in MoonPay — your SOL lands in your wallet, then swap it here');
    btn.disabled=false; btn.textContent=label;
  }catch(e){ toast('card checkout failed',true); btn.disabled=false; btn.textContent=label; }
}
$('cardBtn').addEventListener('click',doCard);

buildAmts(); setAmt(0.1);
</script>
</body>
</html>
