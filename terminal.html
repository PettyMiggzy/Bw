<script>
var SOLMINT='So11111111111111111111111111111111111111112';
var CHRONIC='J5vR9wAwQEx29KNwSnv5hUx9gDyNeRZZE9XDEQeBpump';
var $=function(i){return document.getElementById(i);};
var wallet=null, token=null, side='buy', amount=0.5, decimals=6, tokBal=0;
function fmt(n){n=Number(n)||0;if(Math.abs(n)>=1e9)return(n/1e9).toFixed(2)+'B';if(Math.abs(n)>=1e6)return(n/1e6).toFixed(2)+'M';if(Math.abs(n)>=1e3)return(n/1e3).toFixed(1)+'K';if(Math.abs(n)<1&&n!==0)return n.toPrecision(3);return n.toFixed(2);}
function sh(a){return a?a.slice(0,4)+'…'+a.slice(-4):'?';}
function esc(s){return String(s).replace(/[<>&"]/g,function(c){return{'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c];});}
var _th;function toast(m,bad){var t=$('toast');t.textContent=m;t.classList.toggle('bad',!!bad);t.classList.add('show');clearTimeout(_th);_th=setTimeout(function(){t.classList.remove('show');},2400);}

/* wallet */
function provider(){var p=(window.phantom&&window.phantom.solana)||window.solana;return(p&&p.isPhantom)?p:null;}
function isMobile(){var u=navigator.userAgent||'';return /android|iphone|ipad|ipod/i.test(u)||(/Macintosh/.test(u)&&navigator.maxTouchPoints>1);}
var _w3;async function web3(){if(!_w3)_w3=await import('https://esm.sh/@solana/web3.js@1.95.3');return _w3;}
function conn(w3){return new w3.Connection(location.origin+'/api/solrpc','confirmed');}
async function connect(){var p=provider();
  if(!p){ if(isMobile()){ toast('opening in Phantom…'); var t=encodeURIComponent(location.href.replace('://burnchronic.xyz/','://www.burnchronic.xyz/')); location.href='https://phantom.app/ul/browse/'+t+'?ref='+encodeURIComponent('https://www.burnchronic.xyz'); return false; } toast('Phantom not found',true); return false; }
  var r=await p.connect(); wallet=r.publicKey.toString(); var b=$('walletBtn'); b.textContent=sh(wallet); b.classList.add('on'); if(token)loadBalance(); return true; }
$('walletBtn').addEventListener('click',function(){ if(wallet){ if(confirm('Disconnect?')){wallet=null;this.textContent='Connect';this.classList.remove('on');} } else connect(); });

/* solrpc */
async function rpc(method,params){ var r=await fetch('/api/solrpc',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({jsonrpc:'2.0',id:1,method:method,params:params})}); var j=await r.json(); return j.result; }
async function loadBalance(){ try{ var r=await rpc('getTokenAccountsByOwner',[wallet,{mint:token.ca},{encoding:'jsonParsed'}]);
  tokBal=0; (r.value||[]).forEach(function(a){ tokBal+=Number(a.account.data.parsed.info.tokenAmount.uiAmount||0); }); renderTrade(); }catch(e){} }

/* ── the feed (pad launches + trending) ── */
var FEATURED=['J5vR9wAwQEx29KNwSnv5hUx9gDyNeRZZE9XDEQeBpump'];
var GRAD_MC=69000; // pump.fun graduation target (~$69k mcap)
function isCurve(d){ return d.dex==='pumpfun'||d.dex==='pump'; }
function isGrad(d){ return d.dex && !isCurve(d); }
function gradPct(d){ return Math.max(0,Math.min(100,Math.round(((d.mc||0)/GRAD_MC)*100))); }
function ageStr(ms){ if(!ms)return '—'; var s=(Date.now()-ms)/1000; if(s<60)return Math.max(0,Math.floor(s))+'s'; if(s<3600)return Math.floor(s/60)+'m'; if(s<86400)return Math.floor(s/3600)+'h'; return Math.floor(s/86400)+'d'; }
function imgSrc(u){ if(!u)return ''; if(u.indexOf('ipfs://')===0)return 'https://ipfs.io/ipfs/'+u.slice(7); return u; }
function proxyImg(u,sz){ if(!u)return ''; sz=sz||80; return 'https://wsrv.nl/?url='+encodeURIComponent(u)+'&w='+sz+'&h='+sz+'&fit=cover&output=webp&maxage=7d'; }
function altGateway(u){ if(u.indexOf('ipfs.io/ipfs/')>=0)return u.replace('ipfs.io/ipfs/','dweb.link/ipfs/'); if(u.indexOf('/ipfs/')>=0)return u.replace(/https?:\/\/[^/]+\/ipfs\//,'https://ipfs.io/ipfs/'); return ''; }
function initials(s){ s=String(s||'').replace(/[^A-Za-z0-9]/g,'').slice(0,2).toUpperCase(); return esc(s||'◎'); }
function avatar(d){ var raw=imgSrc(d.img), ph='<div class="ph">'+initials(d.symbol)+'</div>'; if(!raw)return ph;
  return '<img src="'+esc(proxyImg(raw))+'" loading="lazy" data-alt="'+esc(raw)+'" onerror="termImgErr(this)"/>'+'<div class="ph" style="display:none">'+initials(d.symbol)+'</div>'; }
window.termImgErr=function(img){ var alt=img.getAttribute('data-alt'); if(alt&&img.src!==alt){ img.setAttribute('data-alt',''); img.src=alt; return; } img.style.display='none'; var ph=img.nextElementSibling; if(ph)ph.style.display='flex'; };
function coinCard(d){
  var pad=FEEDPAD[d.ca], grad=isGrad(d), curve=isCurve(d);
  var right='<div class="cright"><span class="gb">'+(grad?'🎓':curve?'🔥':'•')+'</span><span class="ct">'+(grad?'LIVE':curve?gradPct(d)+'%':ageStr(d.created))+'</span></div>';
  var mini=curve?'<div class="cmini"><i style="width:'+gradPct(d)+'%"></i></div>':'';
  return '<div class="coin" data-ca="'+d.ca+'">'+avatar(d)
    +'<div class="ci"><div class="cn">'+esc(d.symbol||'?')+(pad?' <span class="badge pad">PAD</span>':'')+'</div>'
    +'<div class="cp">$'+fmt(d.mc)+' · '+ageStr(d.created)+'</div>'
    +'<div class="cc '+((d.ch||0)>=0?'up':'down')+'">'+((d.ch||0)>=0?'+':'')+(d.ch||0).toFixed(0)+'% · $'+fmt(d.vol)+' vol</div>'+mini+'</div>'+right+'</div>';
}
var FEEDCOINS=null, FEEDPAD={}, FEEDFILTER='trending', FSORT='', FOPEN=false;
var FILTERS={minMc:0,minVol:0,minLiq:0,maxAge:0};
async function showFeed(){
  $('out').innerHTML='<div class="spin">loading the trenches… 🔥</div>';
  var cas=[], pad={}, nmMeta={};
  try{ var pf=await (await fetch('/api/launch',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({action:'feed'})})).json();
    (pf.launches||[]).forEach(function(l){ if(cas.indexOf(l.mint)<0){cas.push(l.mint);pad[l.mint]=1;} }); }catch(e){}
  try{ var nm=await (await fetch('/api/newmints?limit=60')).json();
    (nm.mints||[]).forEach(function(m){ if(cas.indexOf(m.mint)<0)cas.push(m.mint); nmMeta[m.mint]=m; }); }catch(e){}
  for(var ep of ['token-boosts/top','token-boosts/latest','token-profiles/latest']){ try{ var bs=await (await fetch('https://api.dexscreener.com/'+ep+'/v1')).json();
    (bs||[]).filter(function(b){return b.chainId==='solana';}).forEach(function(b){ if(cas.indexOf(b.tokenAddress)<0)cas.push(b.tokenAddress); }); }catch(e){} }
  FEATURED.forEach(function(c){ if(cas.indexOf(c)<0)cas.push(c); });
  cas=cas.slice(0,90);
  var data={};
  for(var i=0;i<cas.length;i+=30){ var chunk=cas.slice(i,i+30);
    try{ var dx=await (await fetch('https://api.dexscreener.com/latest/dex/tokens/'+chunk.join(','))).json();
      (dx.pairs||[]).forEach(function(p){ if(p.chainId!=='solana')return; var a=p.baseToken.address; var lq=(p.liquidity&&p.liquidity.usd)||0;
        if(!data[a]||lq>data[a]._lq) data[a]={ca:a,name:p.baseToken.name,symbol:p.baseToken.symbol,price:Number(p.priceUsd),ch:p.priceChange?Number(p.priceChange.h24||0):0,mc:p.marketCap||p.fdv||0,vol:p.volume?Number(p.volume.h24||0):0,created:p.pairCreatedAt||0,dex:p.dexId||'',img:p.info?p.info.imageUrl:'',_lq:lq}; }); }catch(e){}
  }
  // seed brand-new mints Dexscreener hasn't indexed yet straight from the firehose
  Object.keys(nmMeta).forEach(function(m){ if(!data[m]){ var x=nmMeta[m];
    data[m]={ca:m,name:x.name||'',symbol:x.symbol||'?',price:0,ch:0,mc:0,vol:0,created:x.createdAt||Date.now(),dex:'pumpfun',img:x.image||'',_lq:0}; } });
  FEEDPAD=pad; FEEDCOINS=cas.map(function(c){return data[c];}).filter(Boolean);
  renderFeed(FEEDFILTER);
}
function passFilters(d){
  if(FILTERS.minMc && (d.mc||0)<FILTERS.minMc) return false;
  if(FILTERS.minVol && (d.vol||0)<FILTERS.minVol) return false;
  if(FILTERS.minLiq && (d._lq||0)<FILTERS.minLiq) return false;
  if(FILTERS.maxAge && d.created && (Date.now()-d.created)/3.6e6>FILTERS.maxAge) return false;
  return true;
}
function defSort(f){ return f==='new'?'age':f==='gainers'?'change':f==='graduating'?'grad':'vol'; }
function sortList(list,key){
  if(key==='age') return list.sort(function(a,b){return (FEEDPAD[b.ca]?1e15:0)-(FEEDPAD[a.ca]?1e15:0)||(b.created||0)-(a.created||0);});
  if(key==='change') return list.sort(function(a,b){return (b.ch||0)-(a.ch||0);});
  if(key==='mc'||key==='grad') return list.sort(function(a,b){return (b.mc||0)-(a.mc||0);});
  return list.sort(function(a,b){return (b.vol||0)-(a.vol||0);}); // vol
}
function computeList(f){
  var list=FEEDCOINS.slice();
  if(f==='graduating') list=list.filter(isCurve);
  else if(f==='graduated') list=list.filter(isGrad);
  list=list.filter(passFilters);
  var skey=FSORT||defSort(f);
  if(f==='trending'){ var pads=list.filter(function(d){return FEEDPAD[d.ca];}); var rest=sortList(list.filter(function(d){return !FEEDPAD[d.ca];}),skey); return pads.concat(rest); }
  return sortList(list,skey);
}
function gridHtml(f){
  var list=computeList(f);
  var nActive=(FILTERS.minMc?1:0)+(FILTERS.minVol?1:0)+(FILTERS.minLiq?1:0)+(FILTERS.maxAge?1:0);
  if(!list.length) return '<div class="muted">'+(f==='graduating'?'nothing on the curve right now':f==='graduated'?'no graduated coins in feed':nActive?'no coins match your filters':'nothing here — paste a CA above')+'</div>';
  return '<div class="fresult">'+list.length+' coin'+(list.length===1?'':'s')+'</div><div class="coingrid">'+list.map(coinCard).join('')+'</div>';
}
function paintGrid(){ var g=$('feedGrid'); if(g){ g.innerHTML=gridHtml(FEEDFILTER); wireCoins(); hydrateImages(); } }
function wireCoins(){ document.querySelectorAll('.coin').forEach(function(el){ el.addEventListener('click',function(){ $('ca').value=this.dataset.ca; window.scrollTo(0,0); load(); }); }); }
/* backfill PFPs from on-chain metadata for cards with no image (DexScreener only has it if the team paid) */
function hydrateImages(){
  var need=Array.prototype.slice.call(document.querySelectorAll('.coin')).filter(function(c){ return !c.querySelector('img'); });
  var i=0;
  function next(){ if(i>=need.length)return; var c=need[i++]; var ca=c.getAttribute('data-ca'); if(!ca){ next(); return; }
    fetch('/api/tokenimg?ca='+encodeURIComponent(ca)).then(function(r){return r.json();}).then(function(j){
      if(j&&j.image){ var ph=c.querySelector('.ph'); if(ph){ var img=document.createElement('img'); img.loading='lazy'; img.src=proxyImg(imgSrc(j.image)); img.onerror=function(){ this.remove(); ph.style.display='flex'; }; ph.style.display='none'; c.insertBefore(img,ph); } }
    }).catch(function(){}).finally(next);
  }
  for(var k=0;k<3;k++) next(); // limited concurrency
}
function renderFeed(f){ FEEDFILTER=f; if(!FEEDCOINS){ showFeed(); return; }
  var skey=FSORT||defSort(f);
  var nActive=(FILTERS.minMc?1:0)+(FILTERS.minVol?1:0)+(FILTERS.minLiq?1:0)+(FILTERS.maxAge?1:0);
  var cats=[['trending','🔥 Trending'],['new','🚀 New'],['gainers','📈 Gainers'],['volume','💧 Volume'],['graduating','⏳ Graduating'],['graduated','🎓 Graduated']];
  var tabs='<div class="ftabs">'+cats.map(function(c){return '<div class="ftab'+(c[0]===f?' on':'')+'" data-f="'+c[0]+'">'+c[1]+'</div>';}).join('')+'</div>';
  var sorts=[['vol','Volume'],['mc','Market cap'],['age','Newest'],['change','24h %'],['grad','Closest to grad']];
  var bar='<div class="fbar"><div class="fbtn'+(nActive?' on':'')+'" id="fToggle">⚙ Filters'+(nActive?' <b>'+nActive+'</b>':'')+'</div>'
    +'<select class="fsort" id="fSort">'+sorts.map(function(s){return '<option value="'+s[0]+'"'+(skey===s[0]?' selected':'')+'>↕ '+s[1]+'</option>';}).join('')+'</select></div>';
  var panel='<div class="fpanel'+(FOPEN?' open':'')+'" id="fpanel">'
    +'<div class="fld"><label>Min MC $</label><input id="fMc" type="number" inputmode="numeric" placeholder="0" value="'+(FILTERS.minMc||'')+'"/></div>'
    +'<div class="fld"><label>Min Vol $</label><input id="fVol" type="number" inputmode="numeric" placeholder="0" value="'+(FILTERS.minVol||'')+'"/></div>'
    +'<div class="fld"><label>Min Liq $</label><input id="fLiq" type="number" inputmode="numeric" placeholder="0" value="'+(FILTERS.minLiq||'')+'"/></div>'
    +'<div class="fld"><label>Max Age h</label><input id="fAge" type="number" inputmode="numeric" placeholder="∞" value="'+(FILTERS.maxAge||'')+'"/></div>'
    +(nActive?'<button class="fclear" id="fClear">clear filters ✕</button>':'')+'</div>';
  $('out').innerHTML=tabs+bar+panel+'<div id="feedGrid">'+gridHtml(f)+'</div>';
  document.querySelectorAll('.ftab').forEach(function(el){ el.addEventListener('click',function(){ FSORT=''; renderFeed(this.dataset.f); }); });
  $('fToggle').addEventListener('click',function(){ FOPEN=!FOPEN; $('fpanel').classList.toggle('open',FOPEN); });
  $('fSort').addEventListener('change',function(){ FSORT=this.value; paintGrid(); });
  var dbnc; function applyF(){ clearTimeout(dbnc); dbnc=setTimeout(function(){ FILTERS.minMc=Number($('fMc').value)||0; FILTERS.minVol=Number($('fVol').value)||0; FILTERS.minLiq=Number($('fLiq').value)||0; FILTERS.maxAge=Number($('fAge').value)||0; var t=$('fToggle'); var n=(FILTERS.minMc?1:0)+(FILTERS.minVol?1:0)+(FILTERS.minLiq?1:0)+(FILTERS.maxAge?1:0); if(t){t.classList.toggle('on',!!n);t.innerHTML='⚙ Filters'+(n?' <b>'+n+'</b>':'');} paintGrid(); },450); }
  ['fMc','fVol','fLiq','fAge'].forEach(function(id){ var e=$(id); if(e)e.addEventListener('input',applyF); });
  var fc=$('fClear'); if(fc)fc.addEventListener('click',function(){ FILTERS={minMc:0,minVol:0,minLiq:0,maxAge:0}; renderFeed(FEEDFILTER); });
  wireCoins(); hydrateImages();
}

/* load token */
async function load(){ var ca=$('ca').value.trim(); if(ca.length<32){ toast('paste a valid CA',true); return; }
  $('go').disabled=true; $('out').innerHTML='<div class="spin">loading token…</div>';
  try{
    var dx=await (await fetch('https://api.dexscreener.com/latest/dex/tokens/'+ca)).json();
    var pairs=(dx.pairs||[]).filter(function(p){return p.chainId==='solana';}).sort(function(a,b){return (b.liquidity&&b.liquidity.usd||0)-(a.liquidity&&a.liquidity.usd||0);});
    var p=pairs[0];
    try{ var s=await rpc('getTokenSupply',[ca]); decimals=s.value.decimals; }catch(e){ decimals=6; }
    token={ ca:ca, name:p?p.baseToken.name:'Unknown', symbol:p?p.baseToken.symbol:'?', price:p?Number(p.priceUsd):0,
      ch:p&&p.priceChange?Number(p.priceChange.h24||0):0, mc:p?(p.marketCap||p.fdv||0):0, liq:p&&p.liquidity?p.liquidity.usd:0,
      vol:p&&p.volume?p.volume.h24:0, pair:p?p.pairAddress:null, img:p&&p.info?p.info.imageUrl:'',
      boosts:(p&&p.boosts&&p.boosts.active)||0, socials:(p&&p.info&&p.info.socials)||[], websites:(p&&p.info&&p.info.websites)||[] };
    if(!token.img){ try{ var ji=await (await fetch('/api/tokenimg?ca='+encodeURIComponent(ca))).json(); if(ji&&ji.image)token.img=ji.image; }catch(e){} }
    render(); if(wallet)loadBalance();
  }catch(e){ $('out').innerHTML='<div class="muted">couldn’t load that token — check the CA</div>'; }
  $('go').disabled=false;
}

  var t=token;

  (t.websites||[]).forEach(function(w){ if(w&&w.url) soc+='<a class="soc" href="'+esc(w.url)+'" target="_blank" rel="noopener">🌐 '+esc(w.label||'site')+'</a>'; });
  (t.socials||[]).forEach(function(s){ if(!s||!s.url)return; var ic=s.type==='twitter'?'𝕏':(s.type==='telegram'?'✈️':(s.type==='discord'?'💬':'🔗')); soc+='<a class="soc" href="'+esc(s.url)+'" target="_blank" rel="noopener">'+ic+' '+esc(s.type||'link')+'</a>'; });
  var html='<div class="backf" id="backFeed">‹ all coins</div><div class="card"><div class="thead">'
    +(imgSrc(t.img)?'<img src="'+esc(proxyImg(imgSrc(t.img),96))+'" alt="" data-alt="'+esc(imgSrc(t.img))+'" onerror="termImgErr(this)"/><div class="ph" style="display:none;width:46px;height:46px;border-radius:12px;background:var(--green-deep);align-items:center;justify-content:center;font-family:var(--fd);color:var(--green)">'+initials(t.symbol)+'</div>':'<div style="width:46px;height:46px;border-radius:12px;background:var(--green-deep);display:flex;align-items:center;justify-content:center;font-family:var(--fd);color:var(--green)">'+initials(t.symbol)+'</div>')
    +'<div><div class="nm">'+esc(t.name)+'</div><div class="sy">$'+esc(t.symbol)+' · '+sh(t.ca)+' <span class="dexbadge" id="dexPaid"></span>'+(t.boosts>0?' <span class="dexbadge boost">🚀 x'+t.boosts+'</span>':'')+'</div></div>'
    +'<div class="px"><b>$'+(t.price?t.price.toPrecision(4):'—')+'</b><div class="ch '+(t.ch>=0?'up':'down')+'">'+(t.ch>=0?'+':'')+t.ch.toFixed(1)+'% 24h</div></div></div>'
    +'<div class="tstats"><div class="s"><b>$'+fmt(t.mc)+'</b><i>mcap</i></div><div class="s"><b>$'+fmt(t.liq)+'</b><i>liquidity</i></div><div class="s"><b>$'+fmt(t.vol)+'</b><i>vol 24h</i></div></div>'
    +'<div id="holdersLine"></div>'
    +'<div id="curveBar"></div>'+(soc?'<div class="socrow">'+soc+'</div>':'')+'</div>';
  // chart
  if(t.pair){ html+='<div class="card" style="padding:0;overflow:hidden"><div class="chartwrap"><iframe src="https://dexscreener.com/solana/'+t.pair+'?embed=1&theme=dark&trades=0&info=0"></iframe></div></div>'; }
  // trade
  html+='<div class="card" id="tradeCard"></div>';
  // bundle
  html+='<div class="card"><div class="h2">🔍 Bundle Check<button class="scanbtn" id="scanBtn">SCAN</button></div><div id="bundleOut"><div class="muted">tap SCAN to check holders, snipers &amp; funding clusters</div></div></div>';
  $('out').innerHTML=html;
  renderTrade(); loadCurve(); loadDexPaid(); loadHolders();
  $('scanBtn').addEventListener('click',scan);
  var bf=$('backFeed'); if(bf)bf.addEventListener('click',function(){ history.replaceState(null,'','/terminal'); $('ca').value=''; showFeed(); });
}
async function loadCurve(){ var el=$('curveBar'); if(!el)return;
  try{ var c=await (await fetch('/api/curve?ca='+encodeURIComponent(token.ca))).json();
    if(!c.onCurve){ el.innerHTML=''; return; }
    if(c.complete){ el.innerHTML='<div class="cbar"><div class="grad">🎓 graduated — trading on the open market</div></div>'; return; }
    el.innerHTML='<div class="cbar"><div class="cbarlbl">🔥 bonding curve <b>'+c.progress+'%</b>'+(c.solRaised?' · '+c.solRaised+' SOL raised':'')+'</div><div class="ctrack"><i style="width:'+c.progress+'%"></i></div></div>';
  }catch(e){ el.innerHTML=''; } }

/* quick top-10 holder concentration (curve/LP excluded) — at-a-glance rug check */
async function loadHolders(){ var el=$('holdersLine'); if(!el)return;
  try{ var h=await (await fetch('/api/holders?ca='+encodeURIComponent(token.ca))).json();
    if(h.error||h.top10Pct==null){ el.innerHTML=''; return; }
    var t10=h.top10Pct, lv=t10<20?'good':(t10<35?'mid':'bad');
    el.className='hline '+lv;

    el.innerHTML='👥 top 10 hold <b>'+t10.toFixed(1)+'%</b> · biggest '+bigStr+devStr+(h.lpExcluded?' <span style="color:var(--dim)">· curve/LP excluded</span>':'');
  }catch(e){ el.innerHTML=''; } }

/* DexScreener "paid" status — did the team pay to verify/enhance their DS page (orders API) */
async function loadDexPaid(){ var el=$('dexPaid'); if(!el)return; el.textContent='';
  try{ var o=await (await fetch('https://api.dexscreener.com/orders/v1/solana/'+encodeURIComponent(token.ca))).json();
    var arr=(o&&Array.isArray(o.orders))?o.orders:(Array.isArray(o)?o:[]);
    var paid=arr.some(function(x){return x.status==='approved';});
    var pending=arr.some(function(x){return x.status==='processing'||x.status==='on-hold';});
    if(paid){ el.className='dexbadge paid'; el.textContent='💰 DEX PAID'; }
    else if(pending){ el.className='dexbadge pend'; el.textContent='⏳ DEX pending'; }
    else { el.className='dexbadge unpaid'; el.textContent='○ DEX unpaid'; }
  }catch(e){ el.textContent=''; } }

function renderTrade(){
  var c=$('tradeCard'); if(!c)return;
  var presets = side==='buy' ? [0.1,0.5,1,2] : [25,50,75,100];
  var unit = side==='buy' ? 'SOL' : '% of bag';
  var html='<div class="tabs"><div class="tab buy '+(side==='buy'?'on':'')+'" data-s="buy">BUY</div><div class="tab sell '+(side==='sell'?'on':'')+'" data-s="sell">SELL</div></div>';
  html+='<div class="amts">'+presets.map(function(a){return '<div class="amt'+(a===amount?' on':'')+'" data-a="'+a+'">'+(side==='buy'?a+' ◎':a+'%')+'</div>';}).join('')+'</div>';
  if(side==='buy'){ html+='<div class="custom"><input id="amtIn" type="number" step="0.01" placeholder="SOL amount" /><span>SOL</span></div>'; }
  else { html+='<div class="custom" style="justify-content:center"><span style="color:var(--dim)">bag: '+fmt(tokBal)+' $'+esc(token.symbol)+'</span></div>'; }
  html+='<button class="act '+side+'" id="actBtn">'+(wallet?(side==='buy'?'🪙 Buy $'+esc(token.symbol):'🔻 Sell $'+esc(token.symbol)):'Connect &amp; '+(side==='buy'?'Buy':'Sell'))+'</button>';
  c.innerHTML=html;
  c.querySelectorAll('.tab').forEach(function(t){t.addEventListener('click',function(){side=this.dataset.s;amount=side==='buy'?0.5:50;renderTrade();});});
  c.querySelectorAll('.amt').forEach(function(b){b.addEventListener('click',function(){amount=Number(this.dataset.a);var ai=$('amtIn');if(ai)ai.value='';renderTrade();});});
  var ai=$('amtIn'); if(ai)ai.addEventListener('input',function(){amount=Number(this.value)||0;c.querySelectorAll('.amt').forEach(function(b){b.classList.remove('on');});});
  $('actBtn').addEventListener('click',trade);
}

async function trade(){
  if(!wallet){ if(!(await connect())) return; renderTrade(); }
  var btn=$('actBtn'); var input,output,amt;
  if(side==='buy'){ if(!(amount>0)){toast('enter SOL amount',true);return;} input=SOLMINT; output=token.ca; amt=Math.round(amount*1e9).toString(); }
  else { if(!(tokBal>0)){toast('no bag to sell',true);return;} var sellTokens=tokBal*(amount/100); input=token.ca; output=SOLMINT; amt=(BigInt(Math.floor(sellTokens))*(10n**BigInt(decimals))).toString(); }
  btn.disabled=true; var label=btn.textContent; btn.textContent='routing…';
  try{
    var r=await fetch('/api/swap',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({account:wallet,inputMint:input,outputMint:output,amount:amt})});
    var j=await r.json(); if(j.error||!j.transaction){ toast(j.error||'no route',true); btn.disabled=false; btn.textContent=label; return; }
    btn.textContent='approve in wallet';
    var w3=await web3(); var raw=Uint8Array.from(atob(j.transaction),function(c){return c.charCodeAt(0);});
    var tx=w3.VersionedTransaction.deserialize(raw);
    var sim=await chronicSimulate(conn(w3),tx); if(!sim.ok){ toast('trade would fail — try a smaller size',true); btn.disabled=false; btn.textContent=label; return; }
    var p=provider(); var sig;
    if(p.signAndSendTransaction){ var s=await p.signAndSendTransaction(tx); sig=s.signature||s; } else { var sg=await p.signTransaction(tx); sig=await conn(w3).sendRawTransaction(sg.serialize()); }
    btn.textContent='confirming… ⛓';
    for(var i=0;i<28;i++){ try{ var st=await conn(w3).getSignatureStatuses([sig]); var v=st&&st.value&&st.value[0]; if(v&&(v.confirmationStatus==='confirmed'||v.confirmationStatus==='finalized')){ if(v.err)throw new Error('failed'); break; } }catch(e){ if(/failed/.test(e.message))throw e; } await new Promise(function(r){setTimeout(r,1500);}); }
    toast((side==='buy'?'🪙 bought ':'🔻 sold ')+'$'+token.symbol+' ✓'); btn.disabled=false; btn.textContent=label;
    setTimeout(function(){if(wallet)loadBalance();},2500);
  }catch(e){ toast(/reject/i.test((e&&e.message)||'')?'cancelled':'failed',true); btn.disabled=false; btn.textContent=label; }
}

/* bundle scan (inline) */
async function scan(){ var o=$('bundleOut'); o.innerHTML='<div class="spin">🔍 tracing funding &amp; holders… (~10–20s)</div>';
  try{ var d=await (await fetch('/api/bundle?ca='+encodeURIComponent(token.ca))).json();
    if(d.error){ o.innerHTML='<div class="muted">'+esc(d.error)+'</div>'; return; }
    var html='';
    if(d.score){ var lv=d.score.level; html+='<div class="scorebox '+lv+'"><b>'+d.score.value+'</b><i>'+(lv==='high'?'🚩 high / bundled':lv==='med'?'⚠️ some signals':'✅ looks ok-ish')+'</i></div>';
      (d.score.flags||[]).forEach(function(f){html+='<div class="flag">🚩 '+esc(f)+'</div>';}); }
    if(d.holders){ html+='<div style="font-size:11px;color:var(--dim);margin-top:10px">top 10: <b style="color:var(--gold)">'+d.holders.top10Pct+'%</b> · biggest: '+d.holders.largestPct+'%</div>'; }
    if(d.launch){ html+='<div style="font-size:11px;color:var(--dim);margin-top:4px">sniped at launch: <b style="color:'+(d.launch.sniperPct>=20?'var(--ember)':'var(--gold)')+'">'+d.launch.sniperPct+'%</b> ('+d.launch.sniperCount+' wallets)</div>'; }
    if(d.funding&&d.funding.clusters&&d.funding.clusters.length){ html+='<div style="font-size:11px;color:var(--ember);margin-top:6px">🚩 '+d.funding.clusters[0].size+' wallets share one funder ('+sh(d.funding.clusters[0].funder)+')</div>'; }
    else if(d.funding){ html+='<div style="font-size:11px;color:var(--green);margin-top:6px">✅ no shared-funder bundle in top wallets</div>'; }
    html+='<div style="font-size:10px;color:var(--dim);margin-top:10px;text-align:center"><a style="color:var(--green);text-decoration:none" href="/bundle?ca='+token.ca+'" target="_blank">full report ›</a> · signals only, DYOR 💀</div>';
    o.innerHTML=html;
  }catch(e){ o.innerHTML='<div class="muted">scan failed</div>'; }
}
