<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title> Track Order · CHRONIC Smoke Shop</title>
<meta name="description" content="Track your CHRONIC Smoke Shop order — paste your payment signature to see status." />
<meta name="robots" content="noindex, follow" />
<link rel="canonical" href="https://burnchronic.store/track" />
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png?v=4" />
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Bungee+Shade&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
:root{--void:#070a07;--panel:#101a12;--green:#52ff8f;--green-dim:#2bd96a;--green-deep:#0c3d22;--ember:#ff6a2b;--ember2:#ff3d1f;--gold:#f5cf57;--text:#e9ffe9;--dim:#84a78d;--line:rgba(82,255,143,.16);--fd:'Bungee',sans-serif;--fh:'Bungee Shade',sans-serif;--fm:'Space Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--void);color:var(--text);font-family:var(--fm);min-height:100vh;background-image:radial-gradient(120% 55% at 50% -10%,rgba(82,255,143,.12),transparent 60%)}
.bar{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 14px;backdrop-filter:blur(12px);background:linear-gradient(180deg,rgba(7,10,7,.94),rgba(7,10,7,.45));border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:9px;font-family:var(--fd);color:var(--gold);font-size:15px;text-decoration:none}
.brand img{width:26px;height:26px;border-radius:7px}
.bar a.nav{color:var(--dim);font-size:12px;text-decoration:none}
.wrap{max-width:520px;margin:0 auto;padding:26px 16px 80px}
h1{font-family:var(--fh);font-size:clamp(26px,8vw,40px);text-align:center;color:var(--green);text-shadow:0 0 26px rgba(82,255,143,.4),3px 3px 0 var(--green-deep);margin-bottom:6px}
.sub{text-align:center;color:var(--dim);font-size:11px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:20px}
.card{background:linear-gradient(180deg,rgba(16,26,18,.9),rgba(10,15,11,.92));border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px}
input{width:100%;background:rgba(7,10,7,.6);border:1px solid var(--line);border-radius:10px;color:var(--green);font-family:var(--fm);font-size:12px;padding:13px;outline:none}
input:focus{border-color:var(--green-dim)}
.btn{width:100%;margin-top:10px;font-family:var(--fd);font-size:13px;border:0;border-radius:11px;padding:13px;cursor:pointer;background:linear-gradient(90deg,var(--green-dim),var(--green));color:#04140a}
.btn:disabled{opacity:.5}
.steps{display:flex;justify-content:space-between;margin:6px 0 14px;gap:4px}
.step{flex:1;text-align:center;font-size:9px;color:var(--dim)}
.step .dot{width:22px;height:22px;border-radius:50%;background:rgba(7,10,7,.6);border:1px solid var(--line);margin:0 auto 5px;display:flex;align-items:center;justify-content:center;font-size:11px}
.step.on .dot{background:var(--green);color:#04140a;border-color:transparent}
.step.on{color:var(--green)}
.row{display:flex;justify-content:space-between;font-size:12px;padding:7px 0;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:0}.row b{color:var(--gold)}
.li{font-size:12px;color:var(--text);padding:5px 0}
.muted{color:var(--dim);font-size:12px;text-align:center;padding:8px 0}
.foot{text-align:center;margin-top:18px;font-size:11px;color:var(--dim)}.foot a{color:var(--green);text-decoration:none}
</style>
</head>
<body>
<div class="bar">
  <a class="brand" href="/shop"><img src="/assets/logo-chronic.png" alt="CHRONIC"/>TRACK ORDER</a>
  <a class="nav" href="/shop">‹ shop</a>
</div>
<div class="wrap">
  <h1>TRACK ORDER</h1>
  <div class="sub">paste your payment signature</div>
  <div class="card">
    <input id="tx" placeholder="payment tx signature" spellcheck="false" />
    <button class="btn" id="go">Track →</button>
  </div>
  <div id="out"></div>
  <div class="foot"> <a href="/shop">shop</a> ·  <a href="mailto:team@burnchronic.xyz">contact</a></div>
</div>
<script>
var $=function(i){return document.getElementById(i);};
var STAGES=['new','ordered','shipped','done'];
var LABEL={new:'Received',ordered:'Ordered',shipped:'Shipped',done:'Delivered'};
var EMO={new:'',ordered:'',shipped:'',done:'✅'};
function esc(s){return String(s).replace(/[<>&]/g,function(c){return{'<':'&lt;','>':'&gt;','&':'&amp;'}[c];});}
async function track(){
  var tx=($('tx').value||'').trim(); if(tx.length<32){$('out').innerHTML='<div class="muted">paste a valid payment signature</div>';return;}
  var b=$('go');b.disabled=true;b.textContent='looking…';
  try{
    var r=await fetch('/api/order?tx='+encodeURIComponent(tx));var d=await r.json();
    if(!r.ok){$('out').innerHTML='<div class="card muted">'+esc(d.error||'order not found')+'</div>';return;}
    var idx=STAGES.indexOf(d.status);if(idx<0)idx=0;
    var steps=STAGES.map(function(s,i){return '<div class="step'+(i<=idx?' on':'')+'"><div class="dot">'+EMO[s]+'</div>'+LABEL[s]+'</div>';}).join('');
    var items=(d.items||[]).map(function(it){return '<div class="li">• '+it.qty+'× '+esc(it.name)+'</div>';}).join('');
    $('out').innerHTML='<div class="card"><div class="steps">'+steps+'</div>'+
      '<div class="row"><span>Order</span><b>'+esc(d.id)+'</b></div>'+
      '<div class="row"><span>Status</span><b>'+LABEL[d.status]||d.status+'</b></div>'+
      '<div class="row"><span>Total</span><b>$'+(d.total_usd||0)+'</b></div>'+
      '<div style="margin-top:10px">'+items+'</div></div>';
  }catch(e){$('out').innerHTML='<div class="card muted">couldn\'t reach tracking, try again</div>';}
  finally{b.disabled=false;b.textContent='Track →';}
}
$('go').onclick=track;
$('tx').addEventListener('keydown',function(e){if(e.key==='Enter')track();});
// deep-link: /track?tx=...
var q=new URLSearchParams(location.search).get('tx');if(q){$('tx').value=q;track();}
</script>
</body>
</html>
