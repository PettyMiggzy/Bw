<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>$CHRONIC GROW — private build</title>
<meta name="robots" content="noindex,nofollow" />
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png" />
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Bungee+Shade&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
:root{
  --void:#070a07;--void2:#0c120c;--panel:#101a12;--panel2:#16241a;
  --green:#52ff8f;--green-dim:#2bd96a;--green-deep:#0c3d22;
  --ember:#ff6a2b;--ember2:#ff3d1f;--gold:#f5cf57;--gold2:#d9a93a;--purple:#a85cff;--smoke:#6b34a8;
  --text:#e9ffe9;--dim:#84a78d;--line:rgba(82,255,143,.16);
  --fd:'Bungee',sans-serif;--fh:'Bungee Shade',sans-serif;--fm:'Space Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--void);color:var(--text);font-family:var(--fm);overflow-x:hidden;
  background-image:radial-gradient(120% 55% at 50% -10%,rgba(107,52,168,.3),transparent 60%),
    radial-gradient(80% 50% at 100% 12%,rgba(255,106,43,.12),transparent 55%),
    radial-gradient(80% 50% at 0% 18%,rgba(82,255,143,.1),transparent 55%);}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;
  background-image:linear-gradient(rgba(82,255,143,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(82,255,143,.045) 1px,transparent 1px);
  background-size:42px 42px;mask-image:radial-gradient(120% 80% at 50% 0,#000,transparent 75%)}
.wrap{position:relative;z-index:2;max-width:680px;margin:0 auto;padding:0 14px 120px;min-height:100%}

/* lock */
#lock{position:fixed;inset:0;z-index:9999;background:var(--void);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;text-align:center;padding:24px}
#lock h1{font-family:var(--fh);color:var(--ember);font-size:40px}
#lock p{color:var(--dim);max-width:300px;font-size:13px}
#lock .pad{display:flex;gap:8px}
#lock input{background:var(--panel);border:1px solid var(--line);color:var(--green);font-family:var(--fm);padding:12px 14px;border-radius:12px;width:180px}
#lock button{font-family:var(--fd);background:linear-gradient(90deg,var(--ember2),var(--ember));color:#1a0800;border:0;border-radius:12px;padding:12px 18px;cursor:pointer}

/* top bar */
.bar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 6px;
  backdrop-filter:blur(10px);background:linear-gradient(180deg,rgba(7,10,7,.92),rgba(7,10,7,.4));border-bottom:1px solid var(--line)}
.bar a{color:var(--dim);text-decoration:none;font-size:12px}
.ash{display:flex;align-items:center;gap:8px;font-family:var(--fd);color:var(--gold);font-size:18px}
.ash .puff{font-size:18px}
.priv{font-size:9px;letter-spacing:.16em;color:var(--ember);border:1px solid var(--line);border-radius:20px;padding:5px 9px}

h1.title{font-family:var(--fh);font-size:clamp(34px,11vw,64px);line-height:.92;text-align:center;margin:22px 0 2px;
  color:var(--green);text-shadow:0 0 34px rgba(82,255,143,.5),5px 5px 0 var(--ember2)}
.tagline{text-align:center;color:var(--dim);font-size:12px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:18px}
.tagline b{color:var(--gold)}

/* garden */
.garden{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
.plot{position:relative;aspect-ratio:1/1.05;border-radius:16px;cursor:pointer;overflow:hidden;
  background:linear-gradient(180deg,#1a140c,#0e0a06);border:1px solid rgba(120,90,40,.4);
  display:flex;align-items:flex-end;justify-content:center;transition:transform .12s,box-shadow .2s,border-color .2s}
.plot:active{transform:scale(.97)}
.plot .soil{position:absolute;left:0;right:0;bottom:0;height:34%;background:linear-gradient(180deg,#3a2a16,#1a120a);
  border-top:2px solid rgba(120,90,40,.5)}
.plot .plant{position:relative;z-index:2;font-size:46px;line-height:1;margin-bottom:14%;transition:transform .4s,filter .4s;filter:drop-shadow(0 0 0 transparent)}
.plot .budimg{position:relative;z-index:2;width:66%;margin-bottom:10%;border-radius:12px;
  box-shadow:0 0 26px rgba(82,255,143,.55);animation:ripeglow 1.6s ease-in-out infinite}
@keyframes ripeglow{50%{box-shadow:0 0 40px rgba(245,207,87,.8)}}
.plot .prog{position:absolute;left:8px;right:8px;bottom:6px;z-index:3;height:5px;border-radius:5px;background:rgba(0,0,0,.5);overflow:hidden}
.plot .prog i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--green-dim),var(--green));transition:width .5s linear}
.plot .tag{position:absolute;top:8px;left:8px;z-index:3;font-size:9px;letter-spacing:.08em;color:var(--dim);text-transform:uppercase}
.plot.empty .tag{color:var(--gold)}
.plot.ripe{border-color:var(--green);box-shadow:0 0 22px rgba(82,255,143,.4)}
.plot.ripe .tag{color:var(--green);animation:blink 1s steps(2) infinite}
.plot.locked{cursor:default;opacity:.4;align-items:center}
.plot.locked .lk{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--fd);font-size:11px;color:var(--dim);text-align:center;padding:8px}
@keyframes blink{50%{opacity:.3}}

/* shop */
.shop h2{font-family:var(--fd);font-size:13px;letter-spacing:.18em;color:var(--ember);text-transform:uppercase;margin:6px 0 12px}
.ups{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.up{background:linear-gradient(180deg,rgba(16,26,18,.85),rgba(10,15,11,.85));border:1px solid var(--line);border-radius:14px;
  padding:14px;cursor:pointer;transition:transform .12s,border-color .2s;display:flex;flex-direction:column;gap:4px}
.up:active{transform:scale(.97)}
.up.afford{border-color:var(--green-dim)}
.up .ic{font-size:22px}
.up .nm{font-family:var(--fd);font-size:13px;color:var(--gold)}
.up .ds{font-size:11px;color:var(--dim)}
.up .lv{font-size:10px;color:var(--green);letter-spacing:.06em}
.up .cost{margin-top:4px;font-family:var(--fd);font-size:13px;color:var(--ember)}
.up.maxed{opacity:.5}.up.maxed .cost{color:var(--dim)}

/* raid */
#raid{position:fixed;left:0;right:0;top:0;z-index:200;transform:translateY(-130%);transition:transform .4s;
  background:linear-gradient(90deg,var(--ember2),#7a0d0d);color:#fff;padding:14px;text-align:center;box-shadow:0 8px 30px rgba(255,0,0,.4)}
#raid.show{transform:none}
#raid .rt{font-family:var(--fd);letter-spacing:.06em;font-size:14px}
#raid button{margin-top:8px;font-family:var(--fd);background:#0a0d0a;color:var(--green);border:1px solid var(--green);border-radius:30px;padding:8px 20px;cursor:pointer}
#raid .timer{font-family:var(--fd);color:var(--gold)}

/* float particles */
.ember{position:fixed;z-index:300;width:8px;height:8px;border-radius:50%;pointer-events:none;
  background:radial-gradient(circle,#ffd36a,#ff5a1f);box-shadow:0 0 8px #ff7a2b}

/* toast + music */
.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(20px);z-index:400;opacity:0;
  background:var(--green);color:#04140a;font-family:var(--fd);font-size:12px;padding:10px 18px;border-radius:30px;transition:opacity .25s,transform .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.foot{display:flex;gap:10px;justify-content:center;margin-top:24px}
.foot button{background:transparent;border:1px solid var(--line);color:var(--dim);font-family:var(--fm);font-size:11px;padding:8px 14px;border-radius:20px;cursor:pointer}
.music-btn{position:fixed;left:16px;bottom:18px;z-index:500;width:54px;height:54px;border-radius:50%;cursor:pointer;
  border:1.5px solid var(--gold2);background:radial-gradient(circle,var(--panel2),var(--void));color:var(--gold);font-size:19px;display:grid;place-items:center;
  box-shadow:0 0 0 4px rgba(7,10,7,.6),0 0 20px rgba(245,207,87,.3)}
.music-btn.on{color:var(--green);border-color:var(--green-dim);animation:mp 1.6s ease-in-out infinite}
@keyframes mp{50%{box-shadow:0 0 0 4px rgba(7,10,7,.6),0 0 38px rgba(82,255,143,.7)}}
</style>
</head>
<body>

<!-- LOCK GATE -->
<div id="lock">
  <h1>🔒 PRIVATE</h1>
  <p>$CHRONIC GROW — dev build. This page isn't public. Enter the key to preview.</p>
  <div class="pad"><input id="key" type="password" placeholder="key" autocomplete="off"/><button id="unlock">ENTER</button></div>
</div>

<div class="bar">
  <a href="/">‹ back to site</a>
  <div class="ash"><span class="puff">🔥</span><span id="ashN">0</span><span style="color:var(--dim);margin:0 7px">·</span>🌱<span id="seedN">5</span></div>
  <span class="priv">DEV ONLY</span>
</div>

<div class="wrap">
  <h1 class="title">$CHRONIC GROW</h1>
  <div class="tagline">grow it · <b>burn it</b> · stack the ash · the only crop that lasts is the one that's gone</div>

  <div class="garden" id="garden"></div>

  <div class="shop">
    <h2>▸ The Seed Plug</h2>
    <div class="ups" id="seeds"></div>
    <h2 style="margin-top:22px">▸ The Supply Run</h2>
    <div class="ups" id="ups"></div>
  </div>

  <div class="foot">
    <button id="reset">↻ reset grow</button>
    <button id="wipe">forget key</button>
  </div>
</div>

<div id="raid">
  <div class="rt">🚨 DEA RAID — STASH IT! <span class="timer" id="raidT">4</span>s</div>
  <button id="stash">STASH THE CROP</button>
</div>

<button class="music-btn" id="musicBtn">▶</button>
<div id="ytwrap" style="position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;overflow:hidden;opacity:0;pointer-events:none"><div id="ytplayer"></div></div>
<div class="toast" id="toast"></div>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
/* ============ GATE ============ */
var KEY='chronic420';
function gate(){
  var p=new URLSearchParams(location.search);
  if(p.get('k')===KEY) localStorage.setItem('cg_dev','1');
  if(localStorage.getItem('cg_dev')==='1'){ document.getElementById('lock').style.display='none'; boot(); }
  document.getElementById('unlock').addEventListener('click',tryKey);
  document.getElementById('key').addEventListener('keydown',function(e){if(e.key==='Enter')tryKey();});
  function tryKey(){ if(document.getElementById('key').value.trim()===KEY){localStorage.setItem('cg_dev','1');document.getElementById('lock').style.display='none';boot();} else {document.getElementById('key').value='';document.getElementById('key').placeholder='nope';} }
}

/* ============ MUSIC (YouTube embed) ============ */
var ytP,ytReady=false,ytOn=false,ytStarted=false;
window.onYouTubeIframeAPIReady=function(){ ytP=new YT.Player('ytplayer',{height:'1',width:'1',videoId:'STIOPbEkX6M',
  playerVars:{autoplay:0,controls:0,loop:1,playlist:'STIOPbEkX6M',playsinline:1,rel:0},
  events:{onReady:function(){ytReady=true;},onStateChange:function(e){ytOn=(e.data===1);mbtn();}}}); };
function mbtn(){var b=document.getElementById('musicBtn');b.textContent=ytOn?'♪':'▶';b.classList.toggle('on',ytOn);}
function mplay(){if(ytReady){try{ytP.unMute();ytP.setVolume(65);ytP.playVideo();}catch(e){}}}
document.getElementById('musicBtn').addEventListener('click',function(e){e.stopPropagation();ytOn?ytP.pauseVideo():mplay();});
function mfirst(){if(ytStarted)return;ytStarted=true;mplay();['pointerdown','keydown'].forEach(function(ev){window.removeEventListener(ev,mfirst);});}
['pointerdown','keydown'].forEach(function(ev){window.addEventListener(ev,mfirst,{passive:true});});

/* ============ GAME ============ */
var S, BUDS=['/assets/stash-1.jpg','/assets/stash-2.jpg','/assets/stash-3.jpg','/assets/stash-4.jpg','/assets/stash-6.jpg'];
var DEF={ash:0,seeds:5,plots:[],lvl:{light:0,nutes:0,plot:0,auto:0}};
var MAXPLOTS=9, STARTPLOTS=4;

function growTime(){ return Math.round(45000*Math.pow(0.85,S.lvl.light)); }   // ms to ripe (slower base, grow light speeds up)
function yield_(){ return Math.round(10*Math.pow(1.5,S.lvl.nutes)); }
function plotCount(){ return STARTPLOTS+S.lvl.plot; }

function load(){ try{S=JSON.parse(localStorage.getItem('cg_save'))||null;}catch(e){S=null;} if(!S){S=JSON.parse(JSON.stringify(DEF));} 
  if(typeof S.seeds!=='number') S.seeds=5;
  while(S.plots.length<MAXPLOTS) S.plots.push({state:'empty',at:0,bud:0}); }
function save(){ localStorage.setItem('cg_save',JSON.stringify(S)); }

function boot(){ load(); buildGarden(); buildSeedShop(); buildShop(); renderAll(); setInterval(tick,500); scheduleRaid(); }

function buildGarden(){ var g=document.getElementById('garden'); g.innerHTML='';
  for(var i=0;i<MAXPLOTS;i++){ var d=document.createElement('div'); d.className='plot'; d.dataset.i=i;
    d.innerHTML='<div class="soil"></div><div class="tag"></div><div class="plant"></div><div class="prog"><i></i></div>';
    d.addEventListener('click',(function(idx){return function(){tapPlot(idx);};})(i)); g.appendChild(d); } }

function tapPlot(i){ if(i>=plotCount()) return; var p=S.plots[i];
  if(p.state==='empty'){ if(S.seeds<=0){ toast('out of seeds \u2014 cop some \ud83c\udf31'); return; } S.seeds--; p.state='seed'; p.at=Date.now(); p.bud=Math.floor(Math.random()*BUDS.length); save(); renderPlot(i); renderSeeds(); refreshShops(); }
  else if(p.state==='ripe'){ harvest(i); } }

function harvest(i){ var p=S.plots[i]; var el=document.querySelector('.plot[data-i="'+i+'"]');
  var r=el.getBoundingClientRect(); burst(r.left+r.width/2, r.top+r.height/2);
  S.ash+=yield_(); p.state='empty'; p.at=0; save(); renderPlot(i); renderAsh(); refreshShops(); }

function tick(){ var now=Date.now(), gt=growTime();
  for(var i=0;i<plotCount();i++){ var p=S.plots[i]; if(p.state==='seed'||p.state==='veg'){
    var pr=Math.min(1,(now-p.at)/gt);
    var ns=pr>=1?'ripe':(pr>=0.5?'veg':'seed'); if(ns!==p.state){p.state=ns; if(ns==='ripe'&&S.lvl.auto){ harvest(i); continue;} save();}
    renderPlot(i,pr); } } }

function renderPlot(i,pr){ var el=document.querySelector('.plot[data-i="'+i+'"]'); if(!el)return; var p=S.plots[i];
  el.classList.remove('empty','ripe','locked'); var tag=el.querySelector('.tag'), plant=el.querySelector('.plant'), prog=el.querySelector('.prog i');
  el.querySelectorAll('.budimg').forEach(function(b){b.remove();});
  if(i>=plotCount()){ el.classList.add('locked'); el.innerHTML='<div class="lk">PLOT LOCKED</div>'; return; }
  if(p.state==='empty'){ el.classList.add('empty'); tag.textContent='+ plant'; plant.textContent='🫘'; plant.style.fontSize='22px'; plant.style.filter='grayscale(.6) opacity(.6)'; prog.style.width='0'; }
  else if(p.state==='ripe'){ el.classList.add('ripe'); tag.textContent='● BURN IT'; plant.textContent=''; 
    var img=document.createElement('img'); img.className='budimg'; img.src=BUDS[p.bud||0]; el.insertBefore(img,el.querySelector('.prog')); prog.style.width='100%'; }
  else { tag.textContent=p.state==='veg'?'growing…':'sprouting…'; plant.style.filter='none';
    plant.textContent=p.state==='veg'?'🌿':'🌱'; plant.style.fontSize=p.state==='veg'?'50px':'34px';
    if(pr==null){var gt=growTime();pr=Math.min(1,(Date.now()-p.at)/gt);} prog.style.width=(pr*100)+'%'; } }

function renderAll(){ for(var i=0;i<MAXPLOTS;i++) renderPlot(i); renderAsh(); renderSeeds(); refreshShops(); }
function renderAsh(){ document.getElementById('ashN').textContent=fmt(S.ash); }
function renderSeeds(){ var e=document.getElementById('seedN'); if(e)e.textContent=fmt(S.seeds); }
function refreshShops(){ renderSeedShop(); renderShop(); }
function fmt(n){ n=Math.floor(n); if(n>=1e6)return(n/1e6).toFixed(2)+'M'; if(n>=1e3)return(n/1e3).toFixed(1)+'K'; return n; }

/* shop */
var UPS=[
 {k:'light',ic:'💡',nm:'GROW LIGHT',ds:'grow 15% faster',base:50,mul:1.9,max:8},
 {k:'nutes',ic:'🧪',nm:'NUTRIENTS',ds:'+50% ash / harvest',base:40,mul:1.8,max:10},
 {k:'plot', ic:'🪴',nm:'NEW PLOT',ds:'open another plot',base:120,mul:2.2,max:MAXPLOTS-STARTPLOTS},
 {k:'auto', ic:'🤖',nm:'AUTO-TENDER',ds:'auto-burns ripe buds',base:800,mul:1,max:1}
];
function cost(u){ return Math.round(u.base*Math.pow(u.mul,S.lvl[u.k])); }
function buildShop(){ var w=document.getElementById('ups'); w.innerHTML='';
  UPS.forEach(function(u){ var d=document.createElement('div'); d.className='up'; d.dataset.k=u.k;
    d.addEventListener('click',function(){buy(u);}); w.appendChild(d); }); renderShop(); }
function renderShop(){ UPS.forEach(function(u){ var d=document.querySelector('.up[data-k="'+u.k+'"]'); if(!d)return;
  var maxed=S.lvl[u.k]>=u.max; var c=cost(u); var lvtxt=u.max>1?('LVL '+S.lvl[u.k]):(S.lvl[u.k]?'OWNED':'');
  d.classList.toggle('afford',!maxed&&S.ash>=c); d.classList.toggle('maxed',maxed);
  d.innerHTML='<div class="ic">'+u.ic+'</div><div class="nm">'+u.nm+'</div><div class="ds">'+u.ds+'</div><div class="lv">'+lvtxt+'</div><div class="cost">'+(maxed?'MAXED':('🔥 '+fmt(c)))+'</div>'; }); }
function buy(u){ if(S.lvl[u.k]>=u.max){toast('maxed out');return;} var c=cost(u); if(S.ash<c){toast('need '+fmt(c)+' ash');return;}
  S.ash-=c; S.lvl[u.k]++; save(); renderAsh(); refreshShops(); if(u.k==='plot') renderPlot(plotCount()-1); toast(u.nm+' up!'); }

/* seed plug */
var SEEDPACKS=[{q:1,cost:5},{q:5,cost:22},{q:25,cost:90}];
function buildSeedShop(){ var w=document.getElementById('seeds'); if(!w)return; w.innerHTML='';
  SEEDPACKS.forEach(function(sp,idx){ var d=document.createElement('div'); d.className='up'; d.dataset.sp=idx;
    d.addEventListener('click',function(){buySeeds(sp);}); w.appendChild(d); }); renderSeedShop(); }
function renderSeedShop(){ SEEDPACKS.forEach(function(sp,idx){ var d=document.querySelector('.up[data-sp="'+idx+'"]'); if(!d)return;
  d.classList.toggle('afford',S.ash>=sp.cost);
  d.innerHTML='<div class="ic">🌱</div><div class="nm">+'+sp.q+' SEED'+(sp.q>1?'S':'')+'</div><div class="ds">plant '+sp.q+' more</div><div class="lv"></div><div class="cost">🔥 '+fmt(sp.cost)+'</div>'; }); }
function buySeeds(sp){ if(S.ash<sp.cost){toast('need '+fmt(sp.cost)+' ash');return;} S.ash-=sp.cost; S.seeds+=sp.q; save(); renderAsh(); renderSeeds(); refreshShops(); toast('+'+sp.q+' seed'+(sp.q>1?'s':'')+' 🌱'); }

/* particles */
function burst(x,y){ for(var i=0;i<14;i++){ var e=document.createElement('div'); e.className='ember'; document.body.appendChild(e);
  e.style.left=x+'px'; e.style.top=y+'px'; var ang=Math.random()*Math.PI*2, dist=40+Math.random()*90, dur=600+Math.random()*500;
  e.animate([{transform:'translate(-50%,-50%) scale(1)',opacity:1},{transform:'translate(calc(-50% + '+Math.cos(ang)*dist+'px), calc(-50% + '+(Math.sin(ang)*dist-60)+'px)) scale(0)',opacity:0}],{duration:dur,easing:'cubic-bezier(.2,.7,.3,1)'});
  setTimeout((function(el){return function(){el.remove();};})(e),dur); } }

/* DEA raid */
function scheduleRaid(){ setTimeout(raid, 55000+Math.random()*55000); }
function raid(){ if(localStorage.getItem('cg_dev')!=='1')return; var box=document.getElementById('raid'), t=4, tEl=document.getElementById('raidT');
  tEl.textContent=t; box.classList.add('show'); var safe=false;
  var iv=setInterval(function(){ t--; tEl.textContent=t; if(t<=0){clearInterval(iv); end(false);} },1000);
  function end(ok){ box.classList.remove('show'); document.getElementById('stash').onclick=null;
    if(ok){ var b=Math.round(yield_()*1.5); S.ash+=b; toast('bribed the feds +'+fmt(b)); }
    else { for(var i=0;i<plotCount();i++){ if(S.plots[i].state!=='empty'){ S.plots[i].state='empty'; S.plots[i].at=0; renderPlot(i); toast('raided! lost a plot'); break; } } }
    save(); renderAsh(); renderShop(); scheduleRaid(); }
  document.getElementById('stash').onclick=function(){ if(safe)return; safe=true; clearInterval(iv); end(true); };
}

/* misc */
function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(function(){t.classList.remove('show');},1500); }
document.getElementById('reset').addEventListener('click',function(){ if(confirm('Reset the grow? Ash + upgrades wiped.')){ localStorage.removeItem('cg_save'); load(); renderAll(); for(var i=0;i<MAXPLOTS;i++)renderPlot(i); toast('grow reset'); } });
document.getElementById('wipe').addEventListener('click',function(){ localStorage.removeItem('cg_dev'); location.href='/game'; });

/* run gate last — after all game functions + config vars are defined */
gate();

</script>
</body>
</html>
