<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chronic X-RAY — Token Insider Scan</title>
<meta name="description" content="Paste a Monad token. Instantly see the side wallets — who got tokens without ever buying, who's sitting on free bags, and who already dumped on the community."/>
<meta property="og:title" content="Chronic X-RAY — Token Insider Scan"/>
<link rel="icon" type="image/svg+xml" href="/assets/xray-icon.svg"/>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{--void:#070a07;--void2:#0c120c;--panel:#101a12;--line:rgba(82,255,143,.16);--accent:#52ff8f;--ember:#ff6a2b;--gold:#f5cf57;--ink:#e9ffe9;--dim:#84a78d;--red:#ff4d4d;--amber:#f5b53f;--green:#52ff8f;--disp:'Bungee',sans-serif;--mono:'Space Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--void);color:var(--ink);font-family:var(--mono);line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:760px;margin:0 auto;padding:0 16px 80px}
header{padding:22px 0 14px;text-align:center}
h1{font-family:var(--disp);font-size:26px;letter-spacing:1px;color:var(--accent);text-shadow:0 0 18px rgba(82,255,143,.22)}
.sub{color:var(--dim);font-size:12px;margin-top:4px}
.search{display:flex;gap:8px;margin:18px 0 6px}
#addr{flex:1;background:var(--void2);border:1px solid var(--line);color:var(--ink);padding:13px 14px;font-family:var(--mono);font-size:14px;border-radius:10px}
#addr:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(82,255,143,.22)}
#go{background:var(--accent);color:var(--void);border:0;padding:13px 20px;font-family:var(--disp);font-size:13px;letter-spacing:1px;border-radius:10px;cursor:pointer;white-space:nowrap}
#go:disabled{opacity:.5;cursor:wait}
#msg{min-height:18px;color:var(--dim);font-size:12px;text-align:center;margin-bottom:8px}
.verdict{border-radius:14px;padding:18px;margin:10px 0 16px;border:1px solid var(--line);background:var(--panel)}
.verdict.r{border-color:rgba(255,77,77,.5);background:rgba(255,77,77,.08)}
.verdict.m{border-color:rgba(245,181,63,.5);background:rgba(245,181,63,.08)}
.verdict.g{border-color:rgba(82,255,143,.5);background:rgba(82,255,143,.08)}
.vt{font-family:var(--disp);font-size:20px}
.verdict.r .vt{color:var(--red)}.verdict.m .vt{color:var(--amber)}.verdict.g .vt{color:var(--green)}
.vs{font-size:13px;color:var(--ink);margin-top:6px}.vs b{color:#fff}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}
@media(max-width:560px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:11px;text-align:center}
.stat .n{font-family:var(--disp);font-size:20px;color:var(--accent)}
.stat .l{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.sec{margin:18px 0}
.sec h2{font-size:13px;letter-spacing:1px;color:var(--ink);margin-bottom:2px}
.sec .d{font-size:11px;color:var(--dim);margin-bottom:8px}
.row{display:flex;align-items:center;gap:8px;padding:9px 11px;border:1px solid var(--line);border-radius:10px;margin-bottom:6px;background:var(--panel);font-size:12px}
.row .rk{color:var(--dim);width:24px;font-size:11px}
.row .addr{color:var(--accent);text-decoration:none;font-weight:700}
.row .addr:hover{text-decoration:underline}
.row .flag{color:var(--red);font-size:10px;border:1px solid rgba(255,77,77,.4);border-radius:6px;padding:1px 5px}
.row .bar{flex:1;height:7px;background:var(--void2);border-radius:6px;overflow:hidden;min-width:40px}
.row .bar i{display:block;height:100%;background:var(--accent)}
.row .pc{color:#fff;width:64px;text-align:right;font-variant-numeric:tabular-nums}
.row .badge{font-size:9px;padding:2px 7px;border-radius:20px;letter-spacing:.5px;white-space:nowrap}
.badge.hold{background:rgba(255,77,77,.16);color:var(--red)}
.badge.dump{background:rgba(150,0,0,.3);color:#ff8a8a}
.badge.move{background:var(--void2);color:var(--dim)}
.none{color:var(--dim);font-size:12px;padding:8px 0}
.adv{display:inline-block;margin:14px 0 4px;color:var(--accent);text-decoration:none;font-size:12px;border:1px solid var(--line);border-radius:8px;padding:9px 14px}
.adv:hover{border-color:var(--accent)}
.disc{font-size:10px;color:var(--dim);margin-top:14px;line-height:1.6}
.gate{border:1px solid var(--line);background:var(--panel);border-radius:10px;padding:11px 13px;font-size:12px;color:var(--dim);margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.gate.ok{border-color:rgba(82,255,143,.5);color:var(--green)}
.gate.no{border-color:rgba(245,181,63,.5);color:var(--amber)}
.gate a{color:var(--accent);text-decoration:none}
.gate button{background:var(--accent);color:var(--void);border:0;padding:8px 14px;font-family:var(--disp);font-size:11px;letter-spacing:.5px;border-radius:8px;cursor:pointer;margin-left:auto}
.row .lock{color:var(--dim);font-size:11px;font-style:italic;opacity:.8}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:s .7s linear infinite;vertical-align:-2px;margin-right:6px}
@keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🦴 X-RAY</h1>
    <div class="sub">chronic · paste a token, see the insiders</div>
  </header>
  <div class="search">
    <input id="addr" placeholder="paste a token contract (0x…)" spellcheck="false"/>
    <button id="go">SCAN</button>
  </div>
  <div id="msg"></div>
  <div id="gate" class="gate"></div>
  <div id="out"></div>
</div>
<script>
const EXPLORER='https://monadscan.com';
const $=(s)=>document.querySelector(s);
const short=(a)=>a?a.slice(0,6)+'…'+a.slice(-4):'';
const fmtPct=(p)=>p>=0.01?p.toFixed(2)+'%':(p>0?'<0.01%':'0%');
function msg(t,sp){$('#msg').innerHTML=(sp?'<span class="spin"></span>':'')+(t||'');}
function busy(b,t){$('#go').disabled=b;if(t!==undefined)msg(t,b);}
// ---- token hold-gate ----
const GATE_TOKEN='0x52641feEdCE831247514bf7C2378513741077777', GATE_SYM='CHRONIC', GATE_MIN=250000, GETURL='https://www.burnchronic.xyz';
const GATE_ON=false; // free for now — flip to true to lock wallets behind holding
let HOLDER=false, ACCOUNT=null, BAL=0, lastData=null, lastAddr=null;
function fmtAmt(n){return n>=1e6?(n/1e6).toFixed(2)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':String(Math.floor(n));}
async function connectWallet(){
  if(!window.ethereum){updateGate('No EVM wallet found');return;}
  try{const a=await window.ethereum.request({method:'eth_requestAccounts'});ACCOUNT=(a[0]||'').toLowerCase();
    try{await window.ethereum.request({method:'wallet_switchEthereumChain',params:[{chainId:'0x8f'}]});}catch(e){}
    await checkHold();
  }catch(e){updateGate('connect cancelled');}
}
async function checkHold(){
  if(!ACCOUNT)return;
  try{
    const data='0x70a08231'+'0'.repeat(24)+ACCOUNT.slice(2);
    const r=await fetch('https://rpc.monad.xyz',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({jsonrpc:'2.0',id:1,method:'eth_call',params:[{to:GATE_TOKEN,data},'latest']})});
    const j=await r.json(); BAL=(j.result&&j.result!=='0x')?Number(BigInt(j.result)/(10n**18n)):0;
  }catch(e){BAL=0;}
  HOLDER=BAL>=GATE_MIN; updateGate();
  if(lastData)render(lastData,lastAddr);
}
function updateGate(note){
  const g=$('#gate');
  if(!GATE_ON){g.className='gate ok';g.innerHTML='🟢 Free preview — full insider results open to everyone. Holding '+GATE_SYM+' will unlock it later.';return;}
  if(HOLDER){g.className='gate ok';g.innerHTML='✓ Holder — '+fmtAmt(BAL)+' '+GATE_SYM+' · the insider wallets are unlocked below';return;}
  if(ACCOUNT){g.className='gate no';g.innerHTML='<span>You hold '+fmtAmt(BAL)+' '+GATE_SYM+' · need ≥ '+fmtAmt(GATE_MIN)+' to reveal who the wallets are</span><a href="'+GETURL+'" target="_blank">get '+GATE_SYM+' ↗</a>';return;}
  g.className='gate';g.innerHTML='<span>🔒 '+(note?note+' · ':'')+'Hold ≥ '+fmtAmt(GATE_MIN)+' '+GATE_SYM+' to reveal the insider wallets</span><button onclick="connectWallet()">Connect wallet</button>';
}
window.connectWallet=connectWallet;
function stat(label,val){return '<div class="stat"><div class="n">'+val+'</div><div class="l">'+label+'</div></div>';}
function rowsHTML(arr){
  if(!arr||!arr.length)return '<div class="none">none found ✓</div>';
  const max=Math.max.apply(null,arr.map(r=>r.pct))||1;
  return arr.map(function(r,i){
    const bw=Math.max(3,Math.round(r.pct/max*100));
    const badge=r.cat==='loaded'?'<span class="badge hold">HOLDING FREE</span>':r.cat==='dumper'?'<span class="badge dump">DUMPED</span>':'<span class="badge move">MOVED ON</span>';
    const who=(!GATE_ON||HOLDER)
      ? '<a class="addr" href="'+EXPLORER+'/address/'+r.address+'" target="_blank">'+short(r.address)+'</a>'+(r.fromDeployer?'<span class="flag">⚠ from dev</span>':'')
      : '<span class="lock">🔒 hold to reveal</span>';
    return '<div class="row"><span class="rk">#'+(i+1)+'</span>'+who+
      '<span class="bar"><i style="width:'+bw+'%"></i></span>'+
      '<b class="pc">'+fmtPct(r.pct)+'</b>'+badge+'</div>';
  }).join('');
}
function section(title,desc,arr){
  return '<div class="sec"><h2>'+title+'</h2><div class="d">'+desc+'</div>'+rowsHTML(arr)+'</div>';
}
function render(d,addr){
  lastData=d; lastAddr=addr;
  const s=d.stats, rk=d.risk;
  const vc=rk==='high'?'r':rk==='medium'?'m':'g';
  const vt=rk==='high'?'🔴 High insider risk':rk==='medium'?'🟡 Some insider activity':'🟢 Looks clean';
  let h='<div class="verdict '+vc+'"><div class="vt">'+vt+'</div><div class="vs">'+
    s.side+' wallets got tokens <b>without ever buying</b> · insiders still hold <b>'+s.loadedPct+'%</b> of supply in free bags · <b>'+s.dumped+'</b> already dumped on holders</div></div>';
  h+='<div class="stats">'+stat('Real buyers',s.buyers)+stat('Side wallets',s.side)+stat('Insiders holding',s.loadedPct+'%')+stat('Dumped',s.dumped)+'</div>';
  h+=section('🔴 Insiders still holding free bags','Never bought — got tokens free and are sitting on them. These are who can dump on you next.',d.loaded);
  h+=section('💀 Already dumped on the community','Got tokens free, never bought, then sold straight into the pool.',d.dumpers);
  const movers=d.side.filter(x=>x.cat==='mover');
  h+=section('📦 Got free, moved elsewhere','Received free tokens and sent them to other wallets (often spreading bags across wallets).',movers);
  h+='<a class="adv" href="/xray-graph?address='+addr+'">Advanced: full interaction graph →</a>';
  h+='<p class="disc">Read ~'+s.transfers+' transfers'+(s.partial?' (high-volume token — most recent snapshot)':'')+'. A "side wallet" received tokens without ever buying from the pool; "holding" uses live balances. The LP/pool & routers are excluded automatically. Research tool, heuristic — not financial advice.</p>';
  $('#out').innerHTML=h;
  updateGate();
}
async function scan(addr){
  addr=(addr||'').trim().toLowerCase();
  if(!/^0x[0-9a-f]{40}$/.test(addr)){msg('paste a valid token address (0x + 40 hex)');return;}
  $('#out').innerHTML=''; busy(true,'Reading every transfer + balances… this takes ~10-20s');
  try{
    const r=await fetch('/api/insiders?address='+addr);
    const d=await r.json();
    if(d.error){msg('⚠ '+d.error);busy(false);return;}
    msg(''); render(d,addr);
  }catch(e){msg('⚠ scan failed: '+(e.message||e));}
  busy(false);
}
$('#go').onclick=()=>scan($('#addr').value);
$('#addr').addEventListener('keydown',(e)=>{if(e.key==='Enter')scan($('#addr').value);});
updateGate();
const pre=new URLSearchParams(location.search).get('address')||location.hash.slice(1);
if(pre){$('#addr').value=pre;scan(pre);}
</script>
</body>
</html>
