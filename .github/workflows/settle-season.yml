name: Settle $CHRONIC GROW season

# Pays the top growers (PAYOUT_SLOTS, default 50) their XP-weighted share of the
# $CHRONIC pool + SOL yield, then opens the next season. Idempotent: only acts on
# a season that has actually ended, so it's safe to run daily.
#
# ⚠️ REQUIRED repo secrets — settlement FAILS (no payout) until these are set:
#   Settings -> Secrets and variables -> Actions -> New repository secret
#     SUPABASE_URL            your Supabase project URL
#     SUPABASE_SERVICE_KEY    Supabase service_role key
#     SOLANA_RPC              your Alchemy (or other) mainnet RPC URL
#     POOL_SECRET_KEY         the pool wallet keypair (base58 or JSON array) —
#                             signs the payouts. NEVER commit or share this.
#   Optional: CHRONIC_MINT, CHRONIC_DECIMALS, PAYOUT_SLOTS, YIELD_RESERVE_SOL, POOL_WALLET
# Verify safely first: Actions -> this workflow -> Run workflow -> Dry run = true.

on:
  schedule:
    # 00:05 UTC daily — settles promptly whenever a 7-day season has ended.
    - cron: '5 0 * * *'
  workflow_dispatch:
    inputs:
      dry:
        description: 'Dry run (compute payouts, send nothing)'
        type: boolean
        default: false

concurrency:
  group: settle-season
  cancel-in-progress: false

jobs:
  settle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install settle deps
        working-directory: tools
        run: npm install --no-audit --no-fund
      - name: Run settlement
        working-directory: tools
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SOLANA_RPC: ${{ secrets.SOLANA_RPC }}
          POOL_SECRET_KEY: ${{ secrets.POOL_SECRET_KEY }}
          CHRONIC_MINT: ${{ secrets.CHRONIC_MINT }}
          CHRONIC_DECIMALS: ${{ secrets.CHRONIC_DECIMALS }}
          PAYOUT_SLOTS: ${{ secrets.PAYOUT_SLOTS }}
          YIELD_RESERVE_SOL: ${{ secrets.YIELD_RESERVE_SOL }}
          POOL_WALLET: ${{ secrets.POOL_WALLET }}
        run: node settle-season.js ${{ (github.event_name == 'workflow_dispatch' && inputs.dry) && '--dry' || '' }}
