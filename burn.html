<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>🔥 Burn $CHRONIC</title>
<meta name="description" content="Burn $CHRONIC straight from your wallet — gone forever, supply only goes down. Stacks XP on the GROW leaderboard." />
<link rel="canonical" href="https://www.burnchronic.xyz/burn" />
<meta property="og:title" content="🔥 Burn $CHRONIC" />
<meta property="og:description" content="Feed the fire. Burn $CHRONIC — gone forever. Stacks GROW leaderboard XP." />
<meta property="og:image" content="https://www.burnchronic.xyz/assets/og-chronic.jpg" />
<meta name="twitter:card" content="summary_large_image" />
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png?v=4" />
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Bungee+Shade&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
:root{--void:#070a07;--panel:#101a12;--panel2:#16241a;--green:#52ff8f;--green-dim:#2bd96a;--green-deep:#0c3d22;
--ember:#ff6a2b;--ember2:#ff3d1f;--gold:#f5cf57;--purple:#a85cff;--text:#e9ffe9;--dim:#84a78d;--line:rgba(82,255,143,.16);
--fd:'Bungee',sans-serif;--fh:'Bungee Shade',sans-serif;--fm:'Space Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--void);color:var(--text);font-family:var(--fm);min-height:100%;display:flex;flex-direction:column;
 background-image:radial-gradient(120% 60% at 50% -10%,rgba(255,106,43,.22),transparent 60%),radial-gradient(80% 50% at 0% 20%,rgba(82,255,143,.1),transparent 55%);}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;
 background-image:linear-gradient(rgba(82,255,143,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(82,255,143,.045) 1px,transparent 1px);
 background-size:42px 42px;mask-image:radial-gradient(120% 80% at 50% 0,#000,transparent 75%)}
.bar{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 14px;
 backdrop-filter:blur(12px);background:linear-gradient(180deg,rgba(7,10,7,.92),rgba(7,10,7,.4));border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:9px;font-family:var(--fd);color:var(--gold);font-size:15px;text-decoration:none}
.brand img{width:26px;height:26px;border-radius:7px}
.bar a.nav{color:var(--dim);font-size:12px;text-decoration:none}
.wrap{position:relative;z-index:2;flex:1;max-width:460px;width:100%;margin:0 auto;padding:24px 16px 60px;display:flex;flex-direction:column;justify-content:center}
h1{font-family:var(--fh);font-size:clamp(40px,15vw,68px);line-height:.9;text-align:center;color:var(--ember);text-shadow:0 0 34px rgba(255,106,43,.5),4px 4px 0 var(--green-deep)}
.sub{text-align:center;color:var(--dim);font-size:12px;letter-spacing:.08em;text-transform:uppercase;margin:8px 0 22px}
.sub b{color:var(--gold)}
.card{background:linear-gradient(180deg,rgba(16,26,18,.9),rgba(10,15,11,.92));border:1px solid var(--line);border-radius:20px;padding:18px}
.lab{font-family:var(--fd);font-size:10px;letter-spacing:.18em;color:var(--green);text-transform:uppercase;margin-bottom:10px}
.amts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.amt{font-family:var(--fd);font-size:13px;padding:13px 6px;border-radius:13px;cursor:pointer;text-align:center;background:rgba(7,10,7,.5);border:1px solid var(--line);color:var(--text);transition:.15s}
.amt.on{background:linear-gradient(90deg,var(--ember2),var(--ember));color:#1a0800;border-color:transparent}
.amt:active{transform:scale(.96)}
.custom{display:flex;align-items:center;gap:8px;background:rgba(7,10,7,.5);border:1px solid var(--line);border-radius:13px;padding:4px 12px;margin-bottom:16px}
.custom input{flex:1;background:transparent;border:0;color:var(--green);font-family:var(--fm);font-size:15px;padding:11px 0;outline:none}
.custom span{color:var(--dim);font-size:11px;font-weight:700}
.btn{width:100%;font-family:var(--fd);font-size:15px;border:0;border-radius:14px;padding:16px;cursor:pointer;letter-spacing:.04em}
.btn.fire{background:linear-gradient(90deg,var(--ember2),var(--ember));color:#1a0800;box-shadow:0 8px 28px rgba(255,106,43,.35)}
.btn.fire:disabled{opacity:.5;box-shadow:none}
.btn.ghost{background:transparent;border:1px solid var(--green-dim);color:var(--green)}
.btn:active{transform:scale(.98)}
.split{display:flex;gap:8px;margin:14px 0 0}
.split .s{flex:1;text-align:center;font-size:9px;letter-spacing:.08em;color:var(--dim);text-transform:uppercase;background:rgba(7,10,7,.4);border:1px solid var(--line);border-radius:10px;padding:8px 4px}
.split .s b{display:block;font-family:var(--fd);font-size:13px;margin-bottom:2px}
.split .s.burn b{color:var(--ember)} .split .s.xp b{color:var(--gold)}
.who{text-align:center;font-size:10px;color:var(--dim);margin-top:14px}
.who b{color:var(--green)}
.note{text-align:center;font-size:11px;color:var(--dim);margin-top:20px;line-height:1.6}
.note a{color:var(--green);text-decoration:none}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);z-index:40;opacity:0;background:var(--green);color:#04140a;
 font-family:var(--fd);font-size:12px;padding:11px 18px;border-radius:30px;transition:.25s;pointer-events:none;text-align:center;max-width:92vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.bad{background:var(--ember2);color:#fff}
.ember{position:fixed;z-index:30;width:9px;height:9px;border-radius:50%;pointer-events:none;background:radial-gradient(circle,#ffd36a,#ff5a1f);box-shadow:0 0 9px #ff7a2b}
</style>
</head>
<body>
<div class="bar">
  <a class="brand" href="/"><img src="/assets/coin-logo.png" alt="$CHRONIC"/>BURN</a>
  <a class="nav" href="/grow">🌱 play GROW ›</a>
</div>
<div class="wrap">
  <h1>BURN</h1>
  <div class="sub">$CHRONIC · gone forever · <b>stacks GROW XP</b></div>
  <div class="card">
    <div class="lab">▸ How much to torch?</div>
    <div class="amts" id="amts"></div>
    <div class="custom"><input id="amt" type="number" inputmode="numeric" placeholder="custom amount" /><span>$CHRONIC</span></div>
    <button class="btn fire" id="burnBtn">🔥 Connect &amp; Burn</button>
    <div class="split">
      <div class="s burn"><b>100%</b>burned forever</div>
      <div class="s xp"><b id="xpPrev">50</b>GROW XP</div>
    </div>
    <div class="who" id="who"></div>
  </div>
  <div class="note">no extension needed — just a Solana wallet.<br/>need $CHRONIC? <a href="https://pump.fun/coin/J5vR9wAwQEx29KNwSnv5hUx9gDyNeRZZE9XDEQeBpump" target="_blank" rel="noopener">grab it on pump.fun</a> · <a href="/grow">play the game</a></div>
</div>
<div class="toast" id="toast"></div>
<script>
var MINT='J5vR9wAwQEx29KNwSnv5hUx9gDyNeRZZE9XDEQeBpump', DEC=6, RPC='/api/solrpc';
var PRESETS=[50000,250000,1000000], amount=50000, wallet=null;
var $=function(i){return document.getElementById(i);};
function fmt(n){n=Math.floor(n);if(n>=1e9)return(n/1e9).toFixed(2)+'B';if(n>=1e6)return(n/1e6).toFixed(2)+'M';if(n>=1e3)return(n/1e3).toFixed(0)+'K';return''+n;}
var _th;function toast(m,bad){var t=$('toast');t.textContent=m;t.classList.toggle('bad',!!bad);t.classList.add('show');clearTimeout(_th);_th=setTimeout(function(){t.classList.remove('show');},2200);}
function xpFor(a){return Math.max(1,Math.round(a/1000));}
function setAmt(a){amount=a;$('xpPrev').textContent=fmt(xpFor(a));document.querySelectorAll('.amt').forEach(function(b){b.classList.toggle('on',+b.dataset.a===a);});}

function buildAmts(){var w=$('amts');w.innerHTML='';PRESETS.forEach(function(a){var d=document.createElement('div');d.className='amt'+(a===amount?' on':'');d.dataset.a=a;d.textContent=fmt(a)+' 🔥';d.onclick=function(){$('amt').value='';setAmt(a);};w.appendChild(d);});}
$('amt').addEventListener('input',function(){var v=Math.floor(Number(this.value));if(v>=1){document.querySelectorAll('.amt').forEach(function(b){b.classList.remove('on');});amount=v;$('xpPrev').textContent=fmt(xpFor(v));}});

function provider(){var p=(window.phantom&&window.phantom.solana)||window.solana;return(p&&p.isPhantom)?p:null;}
function isMobile(){var u=navigator.userAgent||'';return /android|iphone|ipad|ipod/i.test(u)||(/Macintosh/.test(u)&&navigator.maxTouchPoints>1);}
var _w3;async function web3(){if(!_w3)_w3=await import('https://esm.sh/@solana/web3.js@1.95.3');return _w3;}
function conn(w3){return new w3.Connection(location.origin+RPC,'confirmed');}
function burst(x,y){for(var i=0;i<18;i++){var e=document.createElement('div');e.className='ember';document.body.appendChild(e);e.style.left=x+'px';e.style.top=y+'px';var ang=Math.random()*Math.PI*2,dist=50+Math.random()*120,dur=600+Math.random()*600;e.animate([{transform:'translate(-50%,-50%) scale(1)',opacity:1},{transform:'translate(calc(-50% + '+Math.cos(ang)*dist+'px),calc(-50% + '+(Math.sin(ang)*dist-70)+'px)) scale(0)',opacity:0}],{duration:dur,easing:'cubic-bezier(.2,.7,.3,1)'});setTimeout(function(){e.remove();},dur);}}

async function api(action,amt,body){var r=await fetch('/api/actions/burn?'+(action?'confirm=1&':'')+'amount='+amt,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});return r.json();}

async function connect(){
  var p=provider();
  if(!p){ if(isMobile()){ toast('opening in Phantom…'); var t=encodeURIComponent(location.href.replace('://burnchronic.xyz/','://www.burnchronic.xyz/')); location.href='https://phantom.app/ul/browse/'+t+'?ref='+encodeURIComponent('https://www.burnchronic.xyz'); return false; } toast('Phantom not found — install it',true); return false; }
  var resp=await p.connect(); wallet=resp.publicKey.toString();
  $('who').innerHTML='🔥 burning as <b>'+wallet.slice(0,4)+'…'+wallet.slice(-4)+'</b>';
  $('burnBtn').textContent='🔥 Burn '+fmt(amount)+' $CHRONIC';
  return true;
}

async function doBurn(){
  var btn=$('burnBtn');
  if(!wallet){ if(!(await connect())) return; }
  if(!(amount>=1)){ toast('enter an amount',true); return; }
  btn.disabled=true; var label=btn.textContent; btn.textContent='building…';
  try{
    var built=await api(false,amount,{account:wallet});
    if(built.error||!built.transaction){ toast(built.message||built.error||'failed',true); btn.disabled=false; btn.textContent=label; return; }
    btn.textContent='approve in wallet 🔥';
    var w3=await web3();
    var raw=Uint8Array.from(atob(built.transaction),function(c){return c.charCodeAt(0);});
    var tx=w3.Transaction.from(raw);
    var p=provider(); var sig;
    if(p.signAndSendTransaction){ var s=await p.signAndSendTransaction(tx); sig=s.signature||s; }
    else { var signed=await p.signTransaction(tx); sig=await conn(w3).sendRawTransaction(signed.serialize()); }
    btn.textContent='burning on-chain… ⛓';
    // confirm
    for(var i=0;i<25;i++){ try{ var st=await conn(w3).getSignatureStatuses([sig]); var v=st&&st.value&&st.value[0]; if(v&&(v.confirmationStatus==='confirmed'||v.confirmationStatus==='finalized')){ if(v.err) throw new Error('tx failed'); break; } }catch(e){ if(/tx failed/.test(e.message)) throw e; } await new Promise(function(r){setTimeout(r,1400);}); }
    burst(window.innerWidth/2, window.innerHeight*0.45);
    // credit XP via the action's confirm step
    try{ await api(true,amount,{account:wallet,signature:sig}); }catch(e){}
    toast('🔥 burned '+fmt(amount)+' · +'+fmt(xpFor(amount))+' XP');
    btn.disabled=false; btn.textContent='🔥 Burn again';
  }catch(e){ toast(/reject/i.test((e&&e.message)||'')?'cancelled':'burn failed',true); btn.disabled=false; btn.textContent=label; }
}

$('burnBtn').addEventListener('click',doBurn);
buildAmts(); setAmt(50000);
// eager wallet label if already connected (no auto-connect prompt)
(function(){var p=provider();})();
</script>
</body>
</html>
