<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>🐦 $CHRONIC Raid Kit</title>
<meta name="description" content="One-tap tweets to raid the timeline for $CHRONIC. Burn it, don't hoard it." />
<link rel="canonical" href="https://www.burnchronic.xyz/raid" />
<meta property="og:title" content="🐦 $CHRONIC Raid Kit" />
<meta property="og:description" content="One-tap tweets to spread the burn. $CHRONIC on Solana." />
<meta property="og:image" content="https://www.burnchronic.xyz/assets/og-chronic.jpg" />
<meta name="twitter:card" content="summary_large_image" />
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png?v=4" />
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Bungee+Shade&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
:root{--void:#070a07;--panel:#101a12;--green:#52ff8f;--green-dim:#2bd96a;--green-deep:#0c3d22;--ember:#ff6a2b;--ember2:#ff3d1f;--gold:#f5cf57;--purple:#a85cff;--text:#e9ffe9;--dim:#84a78d;--line:rgba(82,255,143,.16);--blue:#1d9bf0;--fd:'Bungee',sans-serif;--fh:'Bungee Shade',sans-serif;--fm:'Space Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--void);color:var(--text);font-family:var(--fm);min-height:100vh;
 background-image:radial-gradient(120% 55% at 50% -10%,rgba(29,155,240,.16),transparent 60%),radial-gradient(80% 50% at 100% 12%,rgba(255,106,43,.12),transparent 55%);}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;background-image:linear-gradient(rgba(82,255,143,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(82,255,143,.045) 1px,transparent 1px);background-size:42px 42px;mask-image:radial-gradient(120% 80% at 50% 0,#000,transparent 75%)}
.bar{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;padding:11px 14px;backdrop-filter:blur(12px);background:linear-gradient(180deg,rgba(7,10,7,.92),rgba(7,10,7,.4));border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:9px;font-family:var(--fd);color:var(--gold);font-size:15px;text-decoration:none}
.brand img{width:26px;height:26px;border-radius:7px}
.bar a.nav{color:var(--dim);font-size:12px;text-decoration:none}
.wrap{position:relative;z-index:2;max-width:560px;margin:0 auto;padding:24px 16px 80px}
h1{font-family:var(--fh);font-size:clamp(34px,11vw,58px);line-height:.92;text-align:center;color:var(--blue);text-shadow:0 0 30px rgba(29,155,240,.45),4px 4px 0 var(--green-deep)}
.sub{text-align:center;color:var(--dim);font-size:12px;letter-spacing:.08em;text-transform:uppercase;margin:8px 0 6px}
.sub b{color:var(--gold)}
.hint{text-align:center;color:var(--dim);font-size:11px;margin-bottom:20px}
.tw{background:linear-gradient(180deg,rgba(16,26,18,.9),rgba(10,15,11,.92));border:1px solid var(--line);border-radius:16px;padding:15px 16px;margin-bottom:12px;display:flex;flex-direction:column;gap:12px}
.tw p{font-size:13px;line-height:1.55;color:var(--text)}
.tw .row{display:flex;gap:8px}
.tw .post{flex:1;font-family:var(--fd);font-size:12px;letter-spacing:.04em;text-decoration:none;text-align:center;background:linear-gradient(90deg,#1d9bf0,#0d7ec4);color:#fff;border-radius:12px;padding:12px;box-shadow:0 6px 18px rgba(29,155,240,.28)}
.tw .copy{font-family:var(--fm);font-size:11px;background:transparent;border:1px solid var(--line);color:var(--dim);border-radius:12px;padding:12px 14px;cursor:pointer}
.tw .post:active,.tw .copy:active{transform:scale(.97)}
.ca{margin:6px 0 22px;text-align:center;background:rgba(16,26,18,.7);border:1px solid var(--line);border-radius:14px;padding:12px}
.ca .l{font-size:9px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase}
.ca .v{font-size:11px;color:var(--green);word-break:break-all;margin:4px 0 8px}
.ca button{font-family:var(--fd);font-size:11px;background:var(--green-deep);color:var(--green);border:1px solid var(--green-dim);border-radius:10px;padding:9px 16px;cursor:pointer}
.foot{text-align:center;margin-top:24px;font-size:11px;color:var(--dim)}.foot a{color:var(--green);text-decoration:none}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);z-index:40;opacity:0;background:var(--green);color:#04140a;font-family:var(--fd);font-size:12px;padding:11px 18px;border-radius:30px;transition:.25s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="bar">
  <a class="brand" href="/"><img src="/assets/coin-logo.png" alt="$CHRONIC"/>RAID</a>
  <a class="nav" href="/">‹ back to site</a>
</div>
<div class="wrap">
  <h1>RAID KIT</h1>
  <div class="sub">flood the timeline · <b>burn it don’t hoard it</b></div>
  <div class="hint">tap <b>Post</b> to open a ready-made tweet. switch it up so it’s not copy-paste spam. 🔥</div>

  <div class="ca">
    <div class="l">$CHRONIC contract</div>
    <div class="v" id="ca">J5vR9wAwQEx29KNwSnv5hUx9gDyNeRZZE9XDEQeBpump</div>
    <button id="copyCa">copy CA</button>
  </div>

  <div id="tweets"></div>

  <div class="foot">🔥 <a href="/burn">burn</a> · 🌱 <a href="/grow">grow</a> · <a href="/">home</a></div>
</div>
<div class="toast" id="toast"></div>
<script>
var TWEETS=[
  {t:"🔥 burning $CHRONIC and watching the supply disappear. the only crop that lasts is the one that's gone 💀\n\nburn it, don't hoard it 👇", u:"https://www.burnchronic.xyz/burn"},
  {t:"🌱 $CHRONIC GROW is live — burn to grow, top 3 split the weekly pool every 7 days. i'm farming, are you? 😤", u:"https://www.burnchronic.xyz/grow"},
  {t:"supply only goes down. $CHRONIC on @solana — burn it don't hoard it 🔥💀", u:"https://www.burnchronic.xyz"},
  {t:"gm to everyone stacking XP in $CHRONIC GROW and nobody else ☀️🌿\n\ntop 3 growers split the pool 👇", u:"https://www.burnchronic.xyz/grow"},
  {t:"the skeleton smoked himself to the bone and never put it out. now he's on solana. $CHRONIC 🔥💀", u:"https://www.burnchronic.xyz"},
  {t:"just torched a bag of $CHRONIC 🔥 every burn comes straight off the supply, gone forever. your move 👇", u:"https://www.burnchronic.xyz/burn"}
];
var $=function(i){return document.getElementById(i);};
var _th;function toast(m){var t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(_th);_th=setTimeout(function(){t.classList.remove('show');},1600);}
function intent(t,u){return 'https://twitter.com/intent/tweet?text='+encodeURIComponent(t)+'&url='+encodeURIComponent(u);}
var w=$('tweets');
w.innerHTML=TWEETS.map(function(x,i){
  return '<div class="tw"><p>'+x.t.replace(/\n/g,'<br>')+'</p>'
    +'<div class="row"><a class="post" target="_blank" rel="noopener" href="'+intent(x.t,x.u)+'">🐦 Post on X</a>'
    +'<button class="copy" data-i="'+i+'">copy</button></div></div>';
}).join('');
w.addEventListener('click',function(e){var b=e.target.closest('.copy');if(!b)return;var x=TWEETS[+b.dataset.i];
  navigator.clipboard&&navigator.clipboard.writeText(x.t+'\n'+x.u);toast('copied 🐦');});
$('copyCa').addEventListener('click',function(){navigator.clipboard&&navigator.clipboard.writeText($('ca').textContent);toast('CA copied');});
</script>
</body>
</html>
