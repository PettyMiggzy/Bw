<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="robots" content="noindex,nofollow"/>
<title>Chronic — Official Drop Minter</title>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{--void:#070a07;--panel:#101a12;--panel2:#16241a;--green:#52ff8f;--ember:#ff6a2b;--gold:#f5cf57;--text:#e9ffe9;--dim:#84a78d;--line:rgba(82,255,143,.16);--disp:'Bungee',sans-serif;--mono:'Space Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--mono);background:var(--void);color:var(--text);padding:0 0 60px}
.wrap{max-width:720px;margin:0 auto;padding:0 18px}
header{padding:22px 0;border-bottom:1px solid var(--line);margin-bottom:20px}
h1{font-family:var(--disp);color:var(--ember);font-size:24px}.sub{color:var(--dim);font-size:13px;margin-top:6px}
.bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.btn{border:none;border-radius:10px;padding:13px 20px;font-family:var(--disp);font-size:14px;cursor:pointer;background:var(--green);color:var(--void)}
.btn.ember{background:var(--ember);color:#fff}.btn:disabled{opacity:.45;cursor:not-allowed}
.who{font-size:12px;color:var(--dim)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:560px){.grid{grid-template-columns:1fr}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.card img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
.card .b{padding:12px}.card .nm{font-family:var(--disp);font-size:14px;color:var(--green)}
.st{font-size:12px;margin-top:6px;color:var(--dim)}.st.ok{color:var(--green)}.st.err{color:var(--ember)}.st a{color:var(--gold)}
.note{font-size:12px;color:var(--dim);margin:14px 0}
</style></head><body>
<header><div class="wrap"><h1>🔥 CHRONIC — Official Drop</h1><div class="sub">Connect your treasury wallet and mint the 6 genesis pieces. You become owner + 5% royalty on each.</div></div></header>
<div class="wrap">
  <div class="bar">
    <button class="btn" id="connectBtn" onclick="connect()">Connect Wallet</button>
    <button class="btn ember" id="mintBtn" onclick="mintAll()" disabled>🔥 Mint all 6</button>
    <span class="who" id="who"></span>
  </div>
  <div class="note">Mint fee is 0 — you only pay gas. They mint in order; approve each in your wallet. Each lands in the /community gallery automatically.</div>
  <div class="grid" id="grid"></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.2/ethers.umd.min.js"></script>
<script>
var MINT_ADDR='0x5F4EA86d5679c04Ebf7a548f8E0Ac11c8dBaac6A';
var CHAIN_HEX='0x8f';
var ABI=["function mint(string uri) payable returns (uint256)","event Minted(uint256 indexed id, address indexed creator, string uri)"];
var SB_URL='https://cuqhqcmrgpdjlhyqztnc.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1cWhxY21yZ3BkamxoeXF6dG5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMjQ4NDAsImV4cCI6MjA5MjgwMDg0MH0.bsmuC_onaPutZmYZWTn9p1DvngKIA7Xx4J3YRajbf-8';
var ITEMS=[{"name": "Chronic #1 \u00b7 Red Eyes", "desc": "Official $CHRONIC collection art \u2014 the skeleton-stoner of the burn cult. Supply only goes down.", "uri": "ipfs://bafkreifegz5tttp3iqjxv4uymhfgkvrxr5d6rwobv2tcslamesh6uhq6gu", "img": "https://chocolate-manual-lizard-377.mypinata.cloud/ipfs/bafkreifx2mngtfphrksb4laklb3aclhsfp2rc6ozuu4w6l7n3xfwava75q"}, {"name": "Chronic #2 \u00b7 Matrix Rain", "desc": "Official $CHRONIC collection art \u2014 the skeleton-stoner of the burn cult. Supply only goes down.", "uri": "ipfs://bafkreibnc752kqxkr7q62lualtrg4aaomb44ljkouglvippin53srdbaiq", "img": "https://chocolate-manual-lizard-377.mypinata.cloud/ipfs/bafybeiau5pki4yhztyjzzx5s6oagm4vhzqboxvozmubsubvpawejonpxyi"}, {"name": "Chronic #3 \u00b7 Ganja Throne", "desc": "Official $CHRONIC collection art \u2014 the skeleton-stoner of the burn cult. Supply only goes down.", "uri": "ipfs://bafkreihlh5s272znz4dmhtbradu3vvzpteowq4htf3o7cfc55rbrwx6zda", "img": "https://chocolate-manual-lizard-377.mypinata.cloud/ipfs/bafkreiaa7fu2wyh7e5f7dmn2qbhplcizfdggjkycka2qu74ote6x6z3ykm"}, {"name": "Chronic #4 \u00b7 Forest Sesh", "desc": "Official $CHRONIC collection art \u2014 the skeleton-stoner of the burn cult. Supply only goes down.", "uri": "ipfs://bafkreihf6krzf2xdrrfmejlnejzjzhvxvwn4pogvk4ktm6rtoodgh6hrky", "img": "https://chocolate-manual-lizard-377.mypinata.cloud/ipfs/bafkreihs764wqqc35nllm44wijbimfwq3mymao2tfgc2y6xcq5uno63d5q"}, {"name": "Chronic #5 \u00b7 Back 2 Back", "desc": "Official $CHRONIC collection art \u2014 the skeleton-stoner of the burn cult. Supply only goes down.", "uri": "ipfs://bafkreifymjd6xgiut7qgm3usalmvapguql2dk7dahd4mg4wyoyfkbq6icy", "img": "https://chocolate-manual-lizard-377.mypinata.cloud/ipfs/bafkreiadsyefd7hxgi7xbpkih3gj3tokv4qzra26eskpypdiblwpbibqle"}, {"name": "Chronic #6 \u00b7 Lights Out", "desc": "Official $CHRONIC collection art \u2014 the skeleton-stoner of the burn cult. Supply only goes down.", "uri": "ipfs://bafkreicreoso6p5pnbax6lxnarwovru4xyiaaa34wn3m6z676aosuxgjkq", "img": "https://chocolate-manual-lizard-377.mypinata.cloud/ipfs/bafkreierdgfkpo3ejslxq2facxb4axexk3o6pojjjamvukvbstus5npthm"}];
var account=null, signer=null;
function $(i){return document.getElementById(i);}
function render(){$('grid').innerHTML=ITEMS.map(function(it,i){return '<div class="card"><img src="'+it.img+'" alt=""><div class="b"><div class="nm">'+it.name+'</div><div class="st" id="st'+i+'">ready</div></div></div>';}).join('');}
function setSt(i,msg,cls){var e=$('st'+i);if(e){e.innerHTML=msg;e.className='st '+(cls||'');}}
async function connect(){
  if(!window.ethereum){alert('No EVM wallet found');return;}
  var provider=new ethers.BrowserProvider(window.ethereum);
  await provider.send('eth_requestAccounts',[]);
  try{await window.ethereum.request({method:'wallet_switchEthereumChain',params:[{chainId:CHAIN_HEX}]});}catch(e){}
  signer=await provider.getSigner();account=await signer.getAddress();
  $('who').textContent=account.slice(0,6)+'…'+account.slice(-4);
  $('connectBtn').textContent='Connected';$('mintBtn').disabled=false;
}
async function sbInsert(row){return fetch(SB_URL+'/rest/v1/chronic_nfts',{method:'POST',headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':'application/json',Prefer:'return=minimal'},body:JSON.stringify(row)});}
async function mintAll(){
  if(!signer){await connect();if(!signer)return;}
  $('mintBtn').disabled=true;
  var c=new ethers.Contract(MINT_ADDR,ABI,signer);
  for(var i=0;i<ITEMS.length;i++){
    var it=ITEMS[i];
    try{
      setSt(i,'minting… approve in wallet');
      var tx=await c.mint(it.uri);
      setSt(i,'confirming…');
      var rc=await tx.wait();
      var id=null;
      for(var k=0;k<rc.logs.length;k++){try{var p=c.interface.parseLog(rc.logs[k]);if(p&&p.name==='Minted'){id=p.args.id.toString();break;}}catch(e){}}
      try{await sbInsert({contract:MINT_ADDR.toLowerCase(),token_id:id?Number(id):i+1,creator:account.toLowerCase(),name:it.name,description:it.desc,image_url:it.img,metadata_url:it.uri,tx:rc.hash});}catch(e){}
      setSt(i,'✓ minted #'+(id||'?')+' · <a href="https://monadscan.com/tx/'+rc.hash+'" target="_blank">tx</a>','ok');
    }catch(e){setSt(i,'✗ '+((e&&e.shortMessage)||(e&&e.message)||'failed').slice(0,60),'err');}
  }
  $('mintBtn').disabled=false;$('mintBtn').textContent='Done — re-run for any failed';
}
render();
</script></body></html>
