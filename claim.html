<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>CHRONIC · Claim Rewards</title>
<meta name="description" content="Claim your CHRONIC XP rewards. Chat, earn, climb the field. Hold 1M CHRONIC to unlock MON too." />
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png?v=4" />
<link rel="icon" type="image/png" sizes="192x192" href="/assets/favicon-192.png?v=4" />
<link rel="shortcut icon" href="/assets/favicon.ico?v=4" />
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png?v=4" />
<meta name="theme-color" content="#5dff8b" />
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Orbitron:wght@600;800&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.2/ethers.umd.min.js"></script>
<style>
:root{
  --night1:#06140d; --night2:#0a2417; --night3:#0d3320;
  --green:#5dff8b; --green2:#27d96b; --acid:#b6ff3c; --moon:#7affc6;
  --mon:#b79bff; --ink:#eafff0; --dim:#7fc79a;
  --fd:'Orbitron',sans-serif; --fm:'Outfit',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:var(--fm);color:var(--ink);overflow-x:hidden;position:relative;
  background:linear-gradient(180deg,#02060a 0%,#04110b 42%,#062013 78%,#0a2d18 100%);}
/* full-scene animated background video (moon, sky, fireflies, swaying field) */
#bgscene{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;
  background:#03100a url('/assets/scene-loop-poster.jpg') center / cover no-repeat;}
#bgscene video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center}
@media (prefers-reduced-motion:reduce){#bgscene video{display:none}}
/* top scrim (text legibility) + edge vignette */
body::before{content:'';position:fixed;inset:0;z-index:1;pointer-events:none;
  background:
    linear-gradient(180deg,rgba(2,8,5,.58) 0%,rgba(2,8,5,.30) 28%,transparent 52%),
    radial-gradient(120% 80% at 50% 18%,transparent 0%,rgba(2,8,5,.18) 60%,rgba(2,8,5,.5) 100%);}

#scene{display:none}
.stars{position:absolute;inset:0}
.star{position:absolute;width:2px;height:2px;background:#bfffe0;border-radius:50%;opacity:.7;animation:tw 3s infinite ease-in-out}
@keyframes tw{0%,100%{opacity:.2}50%{opacity:.9}}
.moon{position:absolute;top:7%;left:50%;transform:translateX(-50%);width:140px;height:140px;border-radius:50%;
  background:radial-gradient(circle at 38% 35%,#d6fff0,#7affc6 55%,#27d96b 100%);
  box-shadow:0 0 60px 18px rgba(122,255,198,.55),0 0 140px 50px rgba(39,217,107,.30);
  animation:moonglow 6s ease-in-out infinite}
@keyframes moonglow{0%,100%{box-shadow:0 0 60px 18px rgba(122,255,198,.5),0 0 140px 50px rgba(39,217,107,.28)}50%{box-shadow:0 0 80px 26px rgba(122,255,198,.7),0 0 180px 70px rgba(39,217,107,.4)}}
.haze{position:absolute;left:0;right:0;bottom:0;height:55%;
  background:radial-gradient(120% 100% at 50% 120%,rgba(39,217,107,.22),transparent 70%)}
#field{position:absolute;left:0;right:0;bottom:-10px;height:42%;z-index:1}
.plant{position:absolute;bottom:0;transform-origin:bottom center;animation:sway ease-in-out infinite}
@keyframes sway{0%,100%{transform:rotate(var(--r1)) scale(var(--sc))}50%{transform:rotate(var(--r2)) scale(var(--sc))}}
.smoke{position:absolute;bottom:18%;width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle,rgba(182,255,60,.10),transparent 70%);filter:blur(6px);animation:rise linear infinite}
@keyframes rise{0%{transform:translateY(0) scale(.6);opacity:0}20%{opacity:.5}100%{transform:translateY(-220px) scale(1.6);opacity:0}}
.spore{position:absolute;width:3px;height:3px;border-radius:50%;background:var(--acid);box-shadow:0 0 8px 2px var(--acid);animation:float linear infinite}
@keyframes float{0%{transform:translate(0,0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translate(var(--dx),var(--dy));opacity:0}}

.wrap{position:relative;z-index:3;max-width:540px;margin:0 auto;padding:0 18px 80px;min-height:100%}
.bar{display:flex;align-items:center;justify-content:space-between;padding:14px 4px}
.bar a{color:var(--green);text-decoration:none;font-family:var(--fd);font-size:15px;letter-spacing:1px;text-shadow:0 0 10px rgba(93,255,139,.5)}
.bar a.brand{display:flex;align-items:center;gap:10px;font-family:'Bungee',sans-serif;font-size:15px;letter-spacing:.04em;text-shadow:none}
.bar a.brand img{width:38px;height:38px;border-radius:50%;box-shadow:0 0 0 1px #d9a93a,0 0 18px rgba(245,207,87,.4)}
.bar a.brand .c{color:var(--green)}
.right{display:flex;gap:8px;align-items:center}
button.ghost{font-family:var(--fd);font-size:12px;letter-spacing:1px;border:1px solid var(--green);background:rgba(6,20,13,.6);color:var(--green);border-radius:30px;padding:9px 14px;cursor:pointer;backdrop-filter:blur(4px)}
button.ghost.on{background:rgba(93,255,139,.16)}
#anthemBtn{border-color:var(--acid);color:var(--acid)}
#anthemBtn.playing{background:rgba(182,255,60,.18)}

.hero{text-align:center;padding:26px 0 4px}
.hero h1{font-family:var(--fd);font-size:clamp(32px,9vw,52px);letter-spacing:2px;color:var(--green);
  text-shadow:0 0 26px rgba(93,255,139,.6),0 0 4px #fff}
.hero p{color:#d4f4e3;font-size:14px;margin-top:10px;text-shadow:0 2px 9px rgba(0,0,0,.92)}
.leaf{font-size:20px;filter:drop-shadow(0 0 6px var(--green))}

.preview{margin:14px 0;text-align:center;font-size:12px;letter-spacing:.08em;color:#ffe27a;border:1px dashed rgba(255,226,122,.4);border-radius:10px;padding:8px;background:rgba(6,20,13,.5)}

.card{background:linear-gradient(180deg,rgba(13,51,32,.82),rgba(6,20,13,.88));border:1px solid rgba(93,255,139,.22);
  border-radius:18px;padding:22px;margin:16px 0;backdrop-filter:blur(8px);box-shadow:0 8px 40px rgba(0,0,0,.4),inset 0 0 30px rgba(39,217,107,.05)}
.rank{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:8px}
.rank .emoji{font-size:36px;filter:drop-shadow(0 0 8px var(--green))}
.rank .name{font-family:var(--fd);font-size:24px;color:var(--green);letter-spacing:1px}
.xpwrap{text-align:center;color:var(--dim);font-size:13px;margin-top:2px}
.xpbar{height:9px;background:rgba(93,255,139,.12);border-radius:6px;overflow:hidden;margin-top:8px;border:1px solid rgba(93,255,139,.15)}
.xpbar i{display:block;height:100%;background:linear-gradient(90deg,var(--green2),var(--acid));box-shadow:0 0 12px var(--acid)}
.rowline{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid rgba(93,255,139,.12)}
.rowline:last-of-type{border-bottom:0}
.rowline .k{color:var(--dim);font-size:13px;text-transform:uppercase;letter-spacing:.1em}
.rowline .v{font-family:var(--fd);font-size:22px}
.v.green{color:var(--green)}.v.mon{color:var(--mon)}
.locked{font-size:13px;color:var(--dim);text-align:center;margin:6px 0 2px}.locked b{color:var(--mon)}
.claim{margin-top:14px;width:100%;font-family:var(--fd);font-size:18px;letter-spacing:1px;border:0;border-radius:14px;padding:16px;cursor:pointer;
  background:linear-gradient(90deg,var(--green2),var(--acid));color:#04130a;box-shadow:0 0 24px rgba(182,255,60,.4)}
.claim:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}
.tx{font-size:12px;color:var(--green);text-align:center;margin-top:10px;word-break:break-all}
.msg{text-align:center;color:#bfe8d2;font-size:14px;padding:22px;text-shadow:0 2px 8px rgba(0,0,0,.88)}
.pool{text-shadow:0 2px 8px rgba(0,0,0,.85)}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(93,255,139,.25);border-top-color:var(--green);border-radius:50%;animation:s .7s linear infinite;vertical-align:middle}
@keyframes s{to{transform:rotate(360deg)}}
.foot{text-align:center;color:#a9d9c0;font-size:11px;margin-top:24px;line-height:1.9;text-shadow:0 1px 7px rgba(0,0,0,.88)}.foot a{color:var(--green);text-decoration:none}
</style>
</head>
<body>
<div id="bgscene">
  <video autoplay muted loop playsinline preload="auto" poster="/assets/scene-loop-poster.jpg">
    <source src="/assets/scene-loop.mp4" type="video/mp4">
  </video>
</div>

<div class="wrap">
  <div class="bar">
    <a class="brand" href="/"><img src="/assets/logo-chronic.png" alt="" /> <span class="c">$CHRONIC</span></a>
    <div class="right">
      <button class="ghost" id="anthemBtn">▶ ANTHEM</button>
      <button class="ghost" id="connectBtn">CONNECT</button>
    </div>
  </div>

  <div class="hero">
    <h1>CLAIM</h1>
    <p><span class="leaf">🌿</span> chat → earn → claim from the field. you pay gas, the pool pays you. <span class="leaf">🌿</span></p>
  </div>

  <div class="pool" id="pool" style="text-align:center;margin:10px 0 2px;font-size:12px;color:var(--dim)">
    <span style="font-family:var(--fd);letter-spacing:.08em">REWARD POOL</span><br>
    <span id="poolChr" style="color:var(--green)">…</span> CHRONIC &nbsp;·&nbsp; <span id="poolMon" style="color:var(--mon)">…</span> MON
  </div>

  <div id="content">
    <div class="msg">connect your wallet to see your harvest.</div>
  </div>

  <div class="foot">
    Rewards grow from the community pool. Holding <b style="color:var(--green)">1,000,000 CHRONIC</b> unlocks MON on top of CHRONIC.<br>
    <a href="/">home</a>
  </div>
</div>


<script>
const MOCK_MODE     = false;
const POOL_NAME     = "rewardsbot.nad";
const POOL_FALLBACK = "0xfDB919399Ec8605a9787046876F50D646BD6C42A";
const NATIVE        = "0x0000000000000000000000000000000000000000";
const BOT_API       = "/api/claim?wallet=";
const CHRONIC_TOKEN = "0x52641feEdCE831247514bf7C2378513741077777";
const CHAIN_ID      = 143;
const READ_RPC      = "https://rpc.monad.xyz";
const NNS_ADDR      = "0xCc7a1bfF8845573dbF0B3b96e25B9b549d4a2eC7";
const NNS_ABI       = ["function getPrimaryNameForAddress(address) view returns (string)","function getResolvedAddress(bytes32) view returns (address)"];

let POOL_ADDR = POOL_FALLBACK;
const POOL_ABI=[
  "function claim(address token,uint256 cumulative,bytes signature) external",
  "function claimBatch(address[] tokens,uint256[] cumulatives,bytes[] sigs) external",
  "function claimed(address user,address token) view returns (uint256)",
  "function poolBalance(address token) view returns (uint256)"
];
// resolve the pool by name (rewardsbot.nad -> pool address); falls back to the hardcoded address
async function resolvePool(){
  try{
    const ro=new ethers.JsonRpcProvider(READ_RPC,CHAIN_ID);
    const a=await new ethers.Contract(NNS_ADDR,NNS_ABI,ro).getResolvedAddress(ethers.namehash(POOL_NAME));
    if(a && a.toLowerCase()!==NATIVE) POOL_ADDR=a;
  }catch(e){}
}
function $(i){return document.getElementById(i);}
function short(a){return a.slice(0,6)+"…"+a.slice(-4);}
// NNS reverse lookup: address -> .nad name (empty if none). Falls back to short address.
async function nnsLabel(addr){
  try{
    const ro=new ethers.JsonRpcProvider(READ_RPC,CHAIN_ID);
    const nm=(await new ethers.Contract(NNS_ADDR,NNS_ABI,ro).getPrimaryNameForAddress(addr))||'';
    if(!nm) return short(addr);
    const full = nm.includes('.') ? nm : nm+'.nad';
    return full.length>20 ? full.slice(0,17)+'…' : full;
  }catch{ return short(addr); }
}
let account=null, signer=null;

$('connectBtn').addEventListener('click', async function(){
  if(account){ account=null;signer=null; $('connectBtn').textContent='CONNECT'; $('connectBtn').classList.remove('on'); $('content').innerHTML='<div class="msg">connect your wallet to see your harvest.</div>'; return; }
  if(!window.ethereum){ alert('No wallet found. Install MetaMask or open in a wallet browser.'); return; }
  try{
    const bp=new ethers.BrowserProvider(window.ethereum);
    await bp.send('eth_requestAccounts',[]);
    signer=await bp.getSigner(); account=await signer.getAddress();
    $('connectBtn').textContent=short(account)+' ✕'; $('connectBtn').classList.add('on');
    nnsLabel(account).then(function(l){ if(account) $('connectBtn').textContent=l+' ✕'; });
    loadRewards();
  }catch(e){}
});

async function getClaimData(wallet){
  const r=await fetch(BOT_API+encodeURIComponent(wallet),{cache:'no-store'});
  if(!r.ok) throw new Error('could not load rewards');
  const d=await r.json();
  if(!d.found) throw new Error(d.message||'wallet not linked — use /wallet in the group');
  return d;
}

function tokAmt(weiStr,dec){ try{ return Number(ethers.formatUnits(String(weiStr||'0'), dec||18)); }catch{ return 0; } }

async function loadRewards(){
  $('content').innerHTML='<div class="msg"><span class="spin"></span> checking the field…</div>';
  try{
    const d=await getClaimData(account);
    if(d.payoutsDisabled){ $('content').innerHTML='<div class="card"><div class="msg">🌿 '+(d.message||'claims are paused right now — check back soon')+'</div></div>'; return; }
    const entries=(d.entries||[]).map(function(e){
      return Object.assign({},e,{ claimable: Math.max(0, tokAmt(e.cumulative,e.decimals)-tokAmt(e.claimed,e.decimals)) });
    });
    let html='<div class="card"><div class="xpwrap">🌿 '+(d.xp||0)+' XP</div></div><div class="card">';
    if(!entries.length) html+='<div class="msg">nothing to harvest yet — chat in the group to earn 🌿</div>';
    entries.forEach(function(e){
      const right = e.cooldown ? ('next in ~'+e.cooldownDays+'d') : e.claimable.toLocaleString(undefined,{maximumFractionDigits:4});
      html+='<div class="rowline"><span class="k">Claimable '+e.symbol+'</span><span class="v '+(e.symbol==='MON'?'mon':'green')+'">'+right+'</span></div>';
      if(e.floorNotMet) html+='<div class="locked">Keep earning — MON unlocks once you\u2019ve built up enough.</div>';
    });
    const eligible=entries.filter(function(e){ return e.signature && e.claimable>0; });
    html+='<button class="claim" id="claimBtn"'+(eligible.length?'':' disabled')+'>'+(eligible.length?'HARVEST NOW':'NOTHING TO HARVEST')+'</button>';
    html+='<div class="tx" id="txOut"></div></div>';
    $('content').innerHTML=html;
    const b=$('claimBtn'); if(b) b.addEventListener('click',function(){ doClaim(eligible,d); });
  }catch(e){ $('content').innerHTML='<div class="msg" style="color:#ff8585">'+((e&&e.message)||e)+'</div>'; }
}

async function doClaim(eligible,d){
  const b=$('claimBtn'); b.disabled=true; b.textContent='HARVESTING…';
  try{
    const poolAddr = d.pool || POOL_ADDR;
    const c=new ethers.Contract(poolAddr,POOL_ABI,signer);
    const tokens=eligible.map(function(e){return e.token;});
    const cums  =eligible.map(function(e){return e.cumulative;});
    const sigs  =eligible.map(function(e){return e.signature;});
    const tx = tokens.length===1 ? await c.claim(tokens[0],cums[0],sigs[0]) : await c.claimBatch(tokens,cums,sigs);
    $('txOut').textContent='sent — confirming…'; await tx.wait(1);
    $('txOut').innerHTML='✅ harvested! tx: '+tx.hash; b.textContent='HARVESTED ✅';
  }catch(e){ $('txOut').textContent='failed: '+((e&&e.shortMessage)||e.message||e); b.disabled=false; b.textContent='HARVEST NOW'; }
}

// live pool balance display (CHRONIC + MON) so users see it's stocked
async function loadPool(){
  try{
    await resolvePool();
    const ro=new ethers.JsonRpcProvider(READ_RPC,CHAIN_ID);
    const c=new ethers.Contract(POOL_ADDR,POOL_ABI,ro);
    const [chr,mon]=await Promise.all([c.poolBalance(CHRONIC_TOKEN), c.poolBalance(NATIVE)]);
    $('poolChr').textContent=Number(ethers.formatUnits(chr,18)).toLocaleString(undefined,{maximumFractionDigits:0});
    $('poolMon').textContent=Number(ethers.formatEther(mon)).toLocaleString(undefined,{maximumFractionDigits:2});
  }catch(e){ $('poolChr').textContent='—'; $('poolMon').textContent='—'; }
}
loadPool();

</script>
<!-- ANTHEM (same YouTube track as homepage) -->
<div id="ytwrap" style="position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;overflow:hidden;opacity:0;pointer-events:none"><div id="ytplayer"></div></div>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
(function(){
  var player, ready=false, on=false;
  var btn=document.getElementById('anthemBtn');
  window.onYouTubeIframeAPIReady=function(){
    player=new YT.Player('ytplayer',{height:'1',width:'1',videoId:'STIOPbEkX6M',
      playerVars:{autoplay:0,controls:0,loop:1,playlist:'STIOPbEkX6M',playsinline:1,rel:0},
      events:{onReady:function(){ready=true;},
        onStateChange:function(e){ if(e.data===YT.PlayerState.PLAYING){on=true;render();} if(e.data===YT.PlayerState.PAUSED){on=false;render();} }}});
  };
  function render(){ btn.textContent=on?'\u23f8 ANTHEM':'\u25b6 ANTHEM'; btn.classList.toggle('playing',on); }
  function play(){ if(!ready)return; try{player.unMute();player.setVolume(70);player.playVideo();}catch(e){} }
  function pause(){ if(!ready)return; try{player.pauseVideo();}catch(e){} }
  btn.addEventListener('click',function(e){ e.stopPropagation(); on?pause():play(); });
})();
</script>

</body>
</html>
